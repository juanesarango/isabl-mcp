<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isabl Knowledge Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; overflow: hidden;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: #0d1117ee; backdrop-filter: blur(8px);
    padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid #21262d;
  }
  h1 { font-size: 1.2rem; white-space: nowrap; }
  .controls { display: flex; gap: 0.5rem; }
  .btn {
    padding: 0.3rem 0.7rem; background: #21262d; border: 1px solid #30363d;
    color: #8b949e; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
  }
  .btn:hover { background: #30363d; color: #e6edf3; }
  .stats { color: #8b949e; font-size: 0.75rem; margin-left: auto; }
  #canvas { width: 100vw; height: 100vh; padding-top: 52px; }
  svg { width: 100%; height: 100%; }

  .link { fill: none; stroke: #30363d; stroke-width: 1.5; }
  .node-group { cursor: pointer; }
  .node-rect {
    rx: 6; ry: 6; stroke-width: 1.5;
    transition: filter 0.15s;
  }
  .node-group:hover .node-rect { filter: brightness(1.2); }
  .node-label {
    font-size: 11px; fill: #e6edf3; font-weight: 500;
    pointer-events: none;
  }
  .node-badge {
    font-size: 9px; fill: #8b949e; pointer-events: none;
  }
  .node-collapse {
    font-size: 10px; fill: #58a6ff; pointer-events: none;
  }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 20;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 0.8rem 1rem; max-width: 350px; display: none;
    box-shadow: 0 4px 12px #00000066;
  }
  #tooltip .tt-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
  #tooltip .tt-summary { color: #8b949e; font-size: 0.8rem; margin-bottom: 0.4rem; }
  #tooltip .tt-docs { font-size: 0.75rem; color: #58a6ff; }
  #tooltip .tt-hint { font-size: 0.7rem; color: #484f58; margin-top: 0.4rem; }

  /* Detail panel */
  #panel {
    position: fixed; top: 52px; right: 0; width: 380px; height: calc(100vh - 52px);
    background: #161b22; border-left: 1px solid #30363d; z-index: 15;
    overflow-y: auto; padding: 1.5rem; display: none;
  }
  #panel.open { display: block; }
  #panel .close {
    position: absolute; top: 0.8rem; right: 0.8rem; background: none;
    border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer;
  }
  #panel h2 { font-size: 1rem; margin-bottom: 0.5rem; }
  #panel .p-summary { color: #8b949e; font-size: 0.85rem; margin-bottom: 1rem; }
  .doc-item {
    margin: 0.5rem 0; padding: 0.5rem 0.7rem; background: #0d1117;
    border-radius: 4px; border-left: 3px solid #1f6feb;
  }
  .doc-title { font-weight: 500; font-size: 0.8rem; }
  .doc-summary { font-size: 0.75rem; color: #8b949e; margin-top: 0.2rem; }
  .doc-tags { margin-top: 0.3rem; }
  .tag {
    display: inline-block; font-size: 0.65rem; background: #30363d;
    color: #8b949e; padding: 0.1rem 0.35rem; border-radius: 3px; margin: 0.1rem;
  }
  .doc-content {
    margin-top: 0.4rem; padding: 0.5rem; background: #0d1117;
    border: 1px solid #21262d; border-radius: 4px;
    font-size: 0.72rem; color: #c9d1d9; max-height: 200px;
    overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    font-family: 'SFMono-Regular', Consolas, monospace; line-height: 1.4;
  }
  .doc-content-toggle {
    font-size: 0.7rem; color: #58a6ff; cursor: pointer;
    margin-top: 0.3rem; border: none; background: none; padding: 0;
  }
  .doc-content-toggle:hover { text-decoration: underline; }
  .doc-link {
    display: inline-block; margin-top: 0.3rem; font-size: 0.72rem;
    color: #58a6ff; text-decoration: none;
  }
  .doc-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="header">
  <h1>Isabl Knowledge Tree</h1>
  <div class="controls">
    <button class="btn" id="btn-expand">Expand All</button>
    <button class="btn" id="btn-collapse">Collapse All</button>
    <button class="btn" id="btn-fit">Fit View</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<div id="canvas"><svg id="svg"></svg></div>
<div id="tooltip"></div>
<div id="panel"><button class="close" id="panel-close">&times;</button><div id="panel-content"></div></div>

const DOCS = {"isabl_cli/isabl_cli/api.py:isablfy": {"title": "Recursive conversion of objects to IsablDict", "summary": "isablfy converts arbitrary Python objects (including nested lists and dicts) into IsablDict instances recursively. It standardizes data structures returned from API calls or internal functions so downstream code can work with a consistent mapping type.", "tags": ["serialization", "data-structures", "utils"], "content": "# isablfy\n\n```python\ndef isablfy(obj)\n```\n\nConvert objects to IsablDicts recursively.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:chunks": {"title": "Yield successive fixed-size chunks from arrays", "summary": "chunks yields successive n-sized segments from an input sequence, producing an iterator suitable for batching operations. It is useful for splitting work into manageable pieces for bulk API calls or parallel processing and gracefully handles final smaller remainder chunks.", "tags": ["iteration", "batching", "utils"], "content": "# chunks\n\n```python\ndef chunks(array, size)\n```\n\nYield successive n-sized chunks from ``array``.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_api_url": {"title": "Construct canonical API URL from provided address", "summary": "get_api_url produces a full API URL from a provided address or path, ensuring calls go to the correct API base. It normalizes the input so other request helpers can rely on a consistent URL format.", "tags": ["networking", "api", "helpers"], "content": "# get_api_url\n\n```python\ndef get_api_url(url)\n```\n\nGet an API URL.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:retry_request": {"title": "Retry wrapper for HTTP requests with simple backoff", "summary": "retry_request wraps HTTP request calls and attempts them multiple times on transient failures, providing a naive retry/backoff strategy. It helps make the CLI more resilient to temporary network or server errors when performing API operations.", "tags": ["retry", "network", "robustness"], "content": "# retry_request\n\n```python\ndef retry_request(method, **kwargs)\n```\n\nRetry request operation multiple times.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_token_headers": {"title": "Retrieve and cache API token into auth headers", "summary": "get_token_headers obtains an API authentication token and builds the corresponding HTTP headers, storing the token in the user's home directory for reuse. This central helper ensures requests are authenticated and avoids repeatedly prompting for credentials.", "tags": ["authentication", "credentials", "security"], "content": "# get_token_headers\n\n```python\ndef get_token_headers()\n```\n\nGet an API token and store it in user's home directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:send_analytics": {"title": "Transmit user identity and group analytics data", "summary": "send_analytics sends information about the CLI user identity and group to an analytics endpoint, helping track usage and adoption. The function packages user/group metadata and emits it when appropriate (typically during CLI operations).", "tags": ["analytics", "telemetry", "usage"], "content": "# send_analytics\n\n```python\ndef send_analytics(user)\n```\n\nSend analytics about the identity and group of the user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:api_request": {"title": "Generic API request helper with authentication and retry", "summary": "api_request is a high-level wrapper for making HTTP requests against the Isabl API, supporting optional authentication and a naive retry mechanism. It centralizes header injection, URL normalization, error handling, and retry behavior for all client operations.", "tags": ["api", "http-client", "authentication"], "content": "# api_request\n\n```python\ndef api_request(method, url, authenticate=True, **kwargs)\n```\n\nPerform any request operation using a naive retry implementation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:process_api_filters": {"title": "Format keyword filters into requests-compatible params", "summary": "process_api_filters accepts keyword filter arguments and converts them into a params dict suitable for requests (for example turning lists into comma-separated strings). It normalizes filtering input so the client can pass clean query parameters to endpoints.", "tags": ["api", "filters", "helpers"], "content": "# process_api_filters\n\n```python\ndef process_api_filters(**filters)\n```\n\nProcess filters for API.\n\nArguments:\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    dict: a `requests` formatted `params` dict.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:iterate": {"title": "Iterate over paginated API endpoint yielding results", "summary": "iterate walks through a paginated API endpoint, applying provided filters and yielding each object from the 'results' field across pages. It abstracts pagination so callers can consume a continuous stream of items without manually handling page tokens or offsets.", "tags": ["pagination", "api", "iteration"], "content": "# iterate\n\n```python\ndef iterate(url, **filters)\n```\n\nIterate through a paginated API endpoint and yield instances.\n\nArguments:\n    url (str): API URL address.\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    list: of objects in the 'results' key of the API response.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instance": {"title": "Fetch single resource by id, system_id, or username", "summary": "get_instance retrieves a single database/resource instance from an API endpoint using various identifier types (primary key, system_id, email, or username). It supports an optional fields argument to limit returned attributes and returns a SimpleNamespace populated with the response.", "tags": ["lookup", "api", "resources"], "content": "# get_instance\n\n```python\ndef get_instance(endpoint, identifier, fields=None)\n```\n\nGet database instance given any identifier.\n\nArguments:\n    identifier (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    fields (str): comma separated list of fields to be retrieved.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:create_instance": {"title": "Create a new API database instance", "summary": "Describes the create_instance helper that creates a new database object via the Isabl API. It takes an endpoint path and a data dict of fields to create and returns a SimpleNamespace loaded with the API response.", "tags": ["api", "create", "database", "cli"], "content": "# create_instance\n\n```python\ndef create_instance(endpoint, **data)\n```\n\nCreate database instance.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    data (dict): fields to be created.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_instance": {"title": "Patch an existing database instance via API", "summary": "Documents the patch_instance helper for updating fields of an existing database object through the Isabl API. It requires an endpoint, an instance identifier (primary key, system_id, email or username) and keyword fields to patch, returning a SimpleNamespace with the API response.", "tags": ["api", "patch", "update", "cli"], "content": "# patch_instance\n\n```python\ndef patch_instance(endpoint, instance_id, **data)\n```\n\nPatch database instance.\n\nArguments:\n    instance_id (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    data (dict): fields to be patched.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:delete_instance": {"title": "Delete a database instance through API", "summary": "Explains delete_instance which removes a database object using the Isabl API. It accepts an endpoint and an identifier (primary key, system_id, email or username) to identify which object to delete.", "tags": ["api", "delete", "database", "cli"], "content": "# delete_instance\n\n```python\ndef delete_instance(endpoint, identifier)\n```\n\nDelete database instance.\n\nArguments:\n    identifier (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instances": {"title": "Retrieve list of instances from API endpoints", "summary": "Describes get_instances which fetches objects from a list-style API endpoint. It supports optional identifiers, API filter kwargs, and a verbose flag; if neither identifiers nor filters are given it retrieves all objects and will raise click.UsageError for certain invalid string identifiers and endpoints.", "tags": ["api", "list", "filters", "retrieval"], "content": "# get_instances\n\n```python\ndef get_instances(endpoint, identifiers=None, verbose=True, **filters)\n```\n\nReturn instances from a list API endpoint.\n\nIf not `identifiers` and not `filters` retrieves all objects in database.\nif `identifiers` and `filters`, identifieres might be filtered.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    identifiers (list): List of identifiers.\n    filters (dict): name, value pairs for API filtering.\n    verbose (bool): print to stderr how many instances will be retrieved.\n\nRaises:\n    click.UsageError: if string identifier and endpoint not in individuals,\n        samples or workdflows.\n\nReturns:\n    list: of types.SimpleNamespace objects loaded with dicts from API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_experiments": {"title": "Get experiment objects by identifiers or filters", "summary": "Documents get_experiments which retrieves experiment resources by accepting optional identifiers or filter keyword arguments. It provides a simple entry point for fetching experiments from the API using the same identifier/filter pattern as other getters.", "tags": ["api", "experiments", "retrieval"], "content": "# get_experiments\n\n```python\ndef get_experiments(identifiers=None, **filters)\n```\n\nGet experiments give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_analyses": {"title": "Get analysis records using identifiers or filters", "summary": "Documents get_analyses which fetches analysis objects from the API by either identifiers or filter keyword arguments. It mirrors the common pattern used by other endpoint-specific getters for convenience.", "tags": ["api", "analyses", "retrieval"], "content": "# get_analyses\n\n```python\ndef get_analyses(identifiers=None, **filters)\n```\n\nGet analyses give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_projects": {"title": "Fetch project records with identifiers or filters", "summary": "Describes get_projects which retrieves project resources from the API using optional identifiers or filter keyword arguments. It provides the standard identifier/filter interface used across other resource getters.", "tags": ["api", "projects", "retrieval"], "content": "# get_projects\n\n```python\ndef get_projects(identifiers=None, **filters)\n```\n\nGet projects give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instances_count": {"title": "Count objects matching filters on endpoint", "summary": "Explains get_instances_count which returns the number of objects available at a list API endpoint matching provided filters. You provide the endpoint (e.g., 'analyses') and any name/value filter pairs, and it returns an integer count.", "tags": ["api", "count", "filters", "metrics"], "content": "# get_instances_count\n\n```python\ndef get_instances_count(endpoint, **filters)\n```\n\nReturn the count of a list url.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    int: count of objects matching the provided filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_tree": {"title": "Retrieve full data tree for an individual", "summary": "Documents get_tree which fetches all related data for a single individual identified by an identifier. It is a convenience helper to obtain the complete aggregated tree of resources associated with that individual from the API.", "tags": ["api", "individual", "tree", "aggregation"], "content": "# get_tree\n\n```python\ndef get_tree(identifier)\n```\n\nGet everything for an individual.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_trees": {"title": "Retrieve full data trees for multiple individuals", "summary": "Describes get_trees which retrieves the complete aggregated data trees for multiple individuals by accepting identifiers or filters. It extends the single-individual get_tree behavior to batch retrieval across multiple subjects.", "tags": ["api", "individuals", "trees", "batch"], "content": "# get_trees\n\n```python\ndef get_trees(identifiers=None, **filters)\n```\n\nGet everything for multiple individuals.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_analyses_status": {"title": "Batch update analysis status helper", "summary": "Utility function to patch the status field of multiple analysis instances in bulk. It validates the requested status (only 'SUBMITTED' or 'STAGED' allowed), applies the update and returns the list of updated analyses, raising an AssertionError for invalid statuses.", "tags": ["api", "analyses", "batch-operations", "validation"], "content": "# patch_analyses_status\n\n```python\ndef patch_analyses_status(analyses, status)\n```\n\nPatch the `status` of multiple `analyses`.\n\nArguments:\n    analyses (list): of analyses instances.\n    status (str): status to be updated to.\n\nRaises:\n    AssertionError: if status not in {'SUBMITTED', 'STAGED'}.\n\nReturns:\n    list: of updated analyses.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_analysis_status": {"title": "Patch single analysis status and results", "summary": "Function to patch a single analysis instance, ensuring the analysis is owned by the admin user and that the results field is properly updated. It accepts an analysis dict and a status dict and returns the patched analysis instance.", "tags": ["api", "analysis", "patch", "access-control"], "content": "# patch_analysis_status\n\n```python\ndef patch_analysis_status(analysis, status)\n```\n\nPatch a successful analysis.\n\nMake sure analysis is owned by admin user and that results field is updated.\n\nArguments:\n    analysis (dict): analysis instance.\n    status (dict): analysis status.\n\nReturns:\n    dict: patched analysis instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:send_error_email": {"title": "Send error emails to configured recipients", "summary": "Small helper that sends an error message via email to a list of recipients. It takes recipients, subject, and message strings and returns the underlying requests.Response from the API/email service call.", "tags": ["notifications", "error-handling", "api", "email"], "content": "# send_error_email\n\n```python\ndef send_error_email(recipients, subject, message)\n```\n\nSend an error message to recipients.\n\nArguments:\n    recipients (list): email recipients.\n    subject (str): email subject.\n    message (str): error message.\n\nReturns:\n    requests.models.Response: api request response.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:_get_analysis_results": {"title": "Retrieve or validate analysis result data", "summary": "Internal helper intended to obtain an analysis's results (and/or patch them) with an option to raise an error if results are missing or invalid. The function accepts an analysis object and a raise_error flag to control error handling behavior.", "tags": ["api", "analysis", "results", "error-handling"], "content": "# _get_analysis_results\n\n```python\ndef _get_analysis_results(analysis, raise_error=True)\n```\n\nPatch analysis results.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:__init__": {"title": "Constructor supports id-based retrieval", "summary": "Custom __init__ implementation that, when the first argument is an int or str, treats it as an identifier and retrieves the corresponding instance during construction. This enables convenient instantiation from an id value as well as normal construction via other args/kwargs.", "tags": ["initialization", "construction", "api", "convenience"], "content": "# __init__\n\n```python\ndef __init__(self, *args, **kwargs)\n```\n\nIf first argument is int or str, use it to retrieve an instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:fromDict": {"title": "Recursive dictionary to IsablDict transformer", "summary": "Classmethod that converts a plain Python dictionary into IsablDict instances recursively, turning nested dictionaries into typed IsablDict objects. This helper ensures nested structures are consistently wrapped for API/CLI objects.", "tags": ["serialization", "isabldict", "data-model", "conversion"], "content": "# fromDict\n\n```python\ndef fromDict(cls, d)\n```\n\nTransform a dictionary into IsablDicts recursively.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get": {"title": "Custom get checks custom fields first", "summary": "Override of the get method that prioritizes checking for custom fields before falling back to normal dictionary lookup or a provided default. This ensures user-defined/custom metadata fields are accessed consistently in Isabl objects.", "tags": ["isabldict", "accessor", "custom-fields", "api"], "content": "# get\n\n```python\ndef get(self, k, default=None)\n```\n\nCheck first if k is a custom field.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:pop": {"title": "Pop method prefers custom fields first", "summary": "Custom pop implementation that checks for and removes custom fields before falling back to standard dictionary pop behavior. It supports providing a default value and ensures custom metadata can be safely removed from Isabl objects.", "tags": ["isabldict", "mutation", "custom-fields", "api"], "content": "# pop\n\n```python\ndef pop(self, k, default=None)\n```\n\nCheck first if k is a custom field.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:__repr__": {"title": "Readable string representation for assemblies", "summary": "Custom __repr__ implementation that gives assembly objects a concise, informative string representation for easier inspection. This representation surfaces key attributes of assemblies to simplify debugging and logging in interactive sessions.", "tags": ["representation", "assemblies", "debugging", "api"], "content": "# __repr__\n\n```python\ndef __repr__(self)\n```\n\nGet better representation for assemblies.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_fastq": {"title": "Retrieve experiment FASTQ R1 and R2 files", "summary": "get_fastq returns the paired FASTQ file lists for an experiment: a list of R1 files and a list of R2 files. It validates pairing and raises a MissingDataError if the number of R1 and R2 files does not match.", "tags": ["api", "fastq", "sequencing", "error-handling"], "content": "# get_fastq\n\n```python\ndef get_fastq(self)\n```\n\nGet experiment fastq R1 and R2 files.\n\nRaises:\n    MissingDataError: if number of R1 and R2 files is not the same.\n\nReturns:\n    tuple: list of R1 fastq, list of R2.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/app.py:AbstractApplication": {"title": "AbstractApplication base class and method contract", "summary": "AbstractApplication defines the interface and lifecycle hooks for Isabl applications. It documents the methods subclasses must implement (e.g., get_command, get_dependencies, validation hooks, result collectors) and their expected arguments and return types to integrate with the Isabl platform.", "tags": ["application", "abstract-class", "plugin", "lifecycle"], "content": "# class AbstractApplication\n\nAn Abstract Isabl application.\n\n## Methods\n\n### get_command\n\n```python\ndef get_command(self, analysis, inputs, settings)\n```\n\nMust return a shell command for the analysis as a string.\n\nArguments:\n    analysis (dict): an analysis object as retrieved from API.\n    inputs (dict): as returned by `get_dependencies`.\n    settings (dict): applications settings.\n\nReturns:\n    str: command\n\n### get_experiments_from_cli_options\n\n```python\ndef get_experiments_from_cli_options(self, **cli_options)\n```\n\nMust return list of target-reference experiment tuples given the parsed options.\n\nArguments:\n    cli_options (dict): parsed command line options.\n\nReturns:\n    list: of (targets, references) tuples.\n\n### get_analysis_results\n\n```python\ndef get_analysis_results(self, analysis)\n```\n\nGet dictionary of analysis results.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### get_after_completion_status\n\n```python\ndef get_after_completion_status(self, analysis)\n```\n\nPossible values are FINISHED and IN_PROGRESS.\n\n### validate_settings\n\n```python\ndef validate_settings(self, settings)\n```\n\nValidate settings.\n\nMake sure application settings are valid by raising an AssertionError if\nsomething is properly configured.\n\nArguments:\n    settings (isabl_cli.settings.ApplicationSettings): an application settings\n    object, which is also a Munch-like dictionary.\n\n### validate_experiments\n\n```python\ndef validate_experiments(self, targets, references)\n```\n\nRaise AssertionError if tuple combination isn't valid.\n\nSome of the advantages of metadata-driven applications is that we can prevent\nanalyses that don't make sense, for example running a variant calling\napplication on imaging data.\n\nArguments:\n    targets (list): list of targets dictionaries.\n    references (list): list of references dictionaries.\n\nRaises:\n    AssertionError: if tuple is invalid.\n\n### get_dependencies\n\n```python\ndef get_dependencies(self, targets, references, settings)\n```\n\nGet dictionary of inputs, this function is run before `get_command`.\n\nArguments:\n    targets (list): created analysis instance.\n    references (list): created analysis instance.\n    settings (object): settings namespace.\n\nReturns:\n    tuple: (list of analyses dependencies primary keys, inputs dict).\n\n### get_project_analysis_results\n\n```python\ndef get_project_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a project level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### merge_project_analyses\n\n```python\ndef merge_project_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a project level basis.\n\nIf implemented, a new project level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the project level analysis.\n    analyses (list): list of succeeded analyses instances.\n\n### validate_project_analyses\n\n```python\ndef validate_project_analyses(self, project, analyses)\n```\n\nRaise AssertionError if project level analysis logic shouldn't happen.\n\n### get_individual_analysis_results\n\n```python\ndef get_individual_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a individual level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### merge_individual_analyses\n\n```python\ndef merge_individual_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a individual level basis.\n\nIf implemented, a new individual level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the individual level analysis.\n    analyses (list): list of succeeded analyses instances.\n\n### validate_individual_analyses\n\n```python\ndef validate_individual_analyses(self, individual, analyses)\n```\n\nRaise AssertionError if individual level analysis logic shouldn't happen.\n\n### submit_merge_analysis\n\n```python\ndef submit_merge_analysis(self, instance)\n```\n\nDirectly call merge logic unless SUBMIT_MERGE_ANALYSIS.\n\nUse setting SUBMIT_MERGE_ANALYSIS to submit the merge work with custom logic.\n\nArguments:\n    instance (obj): a project or individual instance.\n\n### run_project_merge\n\n```python\ndef run_project_merge(self, project)\n```\n\nMerge analyses on a project level basis.\n\nArguments:\n    project (dict): project instance.\n\n### get_project_level_auto_merge_analysis\n\n```python\ndef get_project_level_auto_merge_analysis(self, project)\n```\n\nGet or create project level analysis.\n\nArguments:\n    project (dict): project instance.\n\nReturns:\n    dict: analysis instance.\n\n### run_individual_merge\n\n```python\ndef run_individual_merge(self, individual)\n```\n\nMerge analyses on a individual level basis.\n\nArguments:\n    individual (dict): individual instance.\n\n### get_individual_level_auto_merge_analysis\n\n```python\ndef get_individual_level_auto_merge_analysis(self, individual)\n```\n\nGet or create individual level analysis.\n\nArguments:\n    individual (dict): individual instance.\n\nReturns:\n    dict: analysis instance.\n\n### client_id\n\n```python\ndef client_id(self)\n```\n\nGet current client ID.\n\n### primary_key\n\n```python\ndef primary_key(self)\n```\n\nSpace separated name, version and assembly.\n\n### settings\n\n```python\ndef settings(self)\n```\n\nReturn the application settings.\n\n### application\n\n```python\ndef application(self)\n```\n\nGet application database object.\n\n### individual_level_auto_merge_application\n\n```python\ndef individual_level_auto_merge_application(self)\n```\n\nGet or create an individual level application database object.\n\n### project_level_auto_merge_application\n\n```python\ndef project_level_auto_merge_application(self)\n```\n\nGet or create a project level application database object.\n\n### assembly\n\n```python\ndef assembly(self)\n```\n\nGet assembly database object.\n\n### has_project_auto_merge\n\n```python\ndef has_project_auto_merge(self)\n```\n\nReturn True if project level auto merge logic is defined.\n\n### has_individual_auto_merge\n\n```python\ndef has_individual_auto_merge(self)\n```\n\nReturn True if individual level auto merge logic is defined.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet application as click command line interface.\n\n### get_cli_command_name\n\n```python\ndef get_cli_command_name(self)\n```\n\nGet name for isabl_cli command.\n\n### get_experiments_from_default_cli_options\n\n```python\ndef get_experiments_from_default_cli_options(cls, cli_options)\n```\n\nGet experiments from default CLI options.\n\n### run\n\n```python\ndef run(self, tuples, commit, force=False, restart=False, verbose=True, run_args=None, local=False)\n```\n\nRun a list of targets, references tuples.\n\nArguments:\n    restart (bool): set settings.restart = True.\n    force (bool): if true, analyses are wiped before being submitted.\n    local (bool): if true, analyses will be run locally one by one.\n    commit (bool): if true, analyses are started (`force` overwrites).\n    verbose (bool): whether or not verbose output should be printed.\n    tuples (list): list of (targets, references) tuples.\n    run_args (dict): dictionary of extra arguments required to run the app.\n\nReturns:\n    tuple: command_tuples, skipped_tuples, invalid_tuples\n\n### run_analyses\n\n```python\ndef run_analyses(self, analyses, commit, force, restart, local)\n```\n\nRun a list of analyses.\n\nReturns:\n    list: tuple of\n\n### send_analytics\n\n```python\ndef send_analytics(self, command_tuples, skipped_tuples, invalid_tuples, commit, force, restart, submitter)\n```\n\nSend analytics event of analyses ran from cli.\n\n### get_command_script_path\n\n```python\ndef get_command_script_path(self, analysis)\n```\n\nGet path to analysis command script.\n\n### get_command_log_path\n\n```python\ndef get_command_log_path(self, analysis)\n```\n\nGet path to analysis log file.\n\n### get_command_err_path\n\n```python\ndef get_command_err_path(self, analysis)\n```\n\nGet path to analysis err file.\n\n### write_command_script\n\n```python\ndef write_command_script(self, analysis, command)\n```\n\nWrite analysis command to bash script and get path to it.\n\nArguments:\n    analysis (dict): an analysis instance.\n    command (str): command to be run.\n\n### get_patch_status_command\n\n```python\ndef get_patch_status_command(key, status)\n```\n\nReturn a command to patch the `status` of a given analysis `key`.\n\n### _get_dependencies_results\n\n```python\ndef _get_dependencies_results(self, targets, references)\n```\n\nGet dependencies' results from a defined application version.\n\nIt's called when `self.dependencies_results` is an array containing an object:\n    {\n        result (str): Result key `Application.results.result_key`.\n        name (str): Name the result will have in the inputs objects.\n        app (obj): `Application` instance.\n        app_name (str): `Application.name`.\n        app_version (str): `Application.version`. If not defined, use\n            any available. Use `any` if you want to use the latest available.\n        app_assembly (str): `Application.assembly.name`. i.e: GRCh37\n        linked (bool): if False, the analysis is not linked as a dependencie of\n            the analysis. As adding new dependencies to an analysis forces isabl\n            to not recognize existing ones (Default: True).\n    }\n\n### _get_analysis_results_from_patterns\n\n```python\ndef _get_analysis_results_from_patterns(self, analysis, specification)\n```\n\nGet first matching file, if \"pattern\" is in result specification.\n\n### _get_analysis_results\n\n```python\ndef _get_analysis_results(self, analysis, created=False)\n```\n\nGet results dictionary and append head job script, logs and error files.\n\n### get_result\n\n```python\ndef get_result(*args, **kwargs)\n```\n\nGet an application result.\n\n### get_results\n\n```python\ndef get_results(*args, **kwargs)\n```\n\nGet application results.\n\n### patch_application_settings\n\n```python\ndef patch_application_settings(self, client_id=None, **settings)\n```\n\nPatch application settings if necessary.\n\n### get_job_name\n\n```python\ndef get_job_name(analysis)\n```\n\nGet job name given an analysis instance.\n\n### echo_run_summary\n\n```python\ndef echo_run_summary(self, run_tuples, skipped_tuples, invalid_tuples)\n```\n\nEcho errors for error tuples such as `invalid`, `cant_run`.\n\nArguments:\n    invalid_tuples (list): of (tuple, error) tuples.\n    run_tuples (list): of (analysis, status) tuples.\n    skipped_tuples (list): of (analysis, skip reason) tuples.\n\n### get_bedfile\n\n```python\ndef get_bedfile(self, experiment, bedfile_type='targets')\n```\n\nGet targets or baits bedfile for experiment.\n\n### get_bam\n\n```python\ndef get_bam(self, experiment)\n```\n\nGet experiment bam for application assembly.\n\n### get_bams\n\n```python\ndef get_bams(self, experiments)\n```\n\nGet bams for multiple experiments.\n\n### update_experiment_bam_file\n\n```python\ndef update_experiment_bam_file(self, experiment, bam_url, analysis_pk)\n```\n\nUpdate experiment default bam for assembly, ADMIN ONLY.\n\n### validate_bams\n\n```python\ndef validate_bams(self, experiments)\n```\n\nRaise error not all experiments have registered bams.\n\n### validate_bedfiles\n\n```python\ndef validate_bedfiles(self, experiments, bedfile_type='targets')\n```\n\nRaise error not all experiments have registered bedfile.\n\n### get_or_create_analyses\n\n```python\ndef get_or_create_analyses(self, tuples)\n```\n\nGet or create analysis for a application and a list of tuples.\n\nArguments:\n    tuples (list): list of (targets, references, analyses) tuples.\n\nReturns:\n    tuple: list of analyses, invalid tuples [(tuple, error), ...].\n\n### get_existing_analyses\n\n```python\ndef get_existing_analyses(self, tuples)\n```\n\nGet list of existing analyses for a list of `tuples`.\n\nCheck targets and references for an exact match. Check whether all the\nrequested analyses are in `analysis.analyses`.\n\nArguments:\n    tuples (list): (targets, references, analyses, inputs) tuples.\n\nReturns:\n    tuple: list of existing analyses, list of tuples without analysis\n\n### get_individual_level_analyses\n\n```python\ndef get_individual_level_analyses(self, tuples)\n```\n\nGet existing individual level analyses.\n\n### __repr__\n\n```python\ndef __repr__(self)\n```\n\nPrint name, version and assembly.\n\n### validate_is_file\n\n```python\ndef validate_is_file(self, path)\n```\n\nValidate path is file.\n\n### validate_is_dir\n\n```python\ndef validate_is_dir(self, path)\n```\n\nValidate path is directory.\n\n### validate_reference_genome\n\n```python\ndef validate_reference_genome(self, reference)\n```\n\nValidate genome exists and has required indexes.\n\n### validate_has_raw_data\n\n```python\ndef validate_has_raw_data(self, experiments)\n```\n\nValidate experiments have raw data.\n\n### validate_single_data_type\n\n```python\ndef validate_single_data_type(self, experiments)\n```\n\nValidate experiments have only one type of raw data.\n\n### validate_fastq_only\n\n```python\ndef validate_fastq_only(self, experiments)\n```\n\nValidate raw data is only fastq.\n\n### validate_is_pair\n\n```python\ndef validate_is_pair(self, targets, references)\n```\n\nValidate targets, references tuple is a pair.\n\n### validate_one_target\n\n```python\ndef validate_one_target(self, targets)\n```\n\nValidate only one target.\n\n### validate_one_target_no_references\n\n```python\ndef validate_one_target_no_references(self, targets, references)\n```\n\nValidate only one sample is passed targets and none on references.\n\n### validate_at_least_one_target_one_reference\n\n```python\ndef validate_at_least_one_target_one_reference(self, targets, references)\n```\n\nValidate that at least one reference and target are passed.\n\n### validate_targets_not_in_references\n\n```python\ndef validate_targets_not_in_references(self, targets, references)\n```\n\nMake sure targets are not passed as references also.\n\n### validate_methods\n\n```python\ndef validate_methods(self, experiments, methods)\n```\n\nMake sure all experimental methods are those expected.\n\n### validate_pdx_only\n\n```python\ndef validate_pdx_only(self, experiments)\n```\n\nMake sure experiments come from PDX samples.\n\n### validate_dna_only\n\n```python\ndef validate_dna_only(self, experiments)\n```\n\nMake sure experiments are DNA data.\n\n### validate_rna_only\n\n```python\ndef validate_rna_only(self, experiments)\n```\n\nMake sure experiments are RNA data.\n\n### validate_dna_pairs\n\n```python\ndef validate_dna_pairs(self, targets, references)\n```\n\nValidate targets, references tuples for base dna applications.\n\n### validate_same_technique\n\n```python\ndef validate_same_technique(self, targets, references)\n```\n\nValidate targets and references have same bedfile.\n\n### validate_same_platform\n\n```python\ndef validate_same_platform(self, targets, references)\n```\n\nValidate targets and references are sequenced on the same platform.\n\n### validate_species\n\n```python\ndef validate_species(self, experiments)\n```\n\nValidate experiments's species is same as application's setting.\n\n### validate_are_normals\n\n```python\ndef validate_are_normals(self, experiments)\n```\n\nRaise error not all experiments come from NORMAL sample.\n\n### validate_individuals\n\n```python\ndef validate_individuals(self, targets, references)\n```\n\nValidate the individual of the targets and references.\n\nValidate pairs are of the same individual if the pipeline is matched.\nValidate pairs are of the different individuals if the pipeline is unmatched.\n\n### validate_source\n\n```python\ndef validate_source(self, experiments, source)\n```\n\nValidate experiments are from a specific source material.\n\n### notify_project_analyst\n\n```python\ndef notify_project_analyst(self, analysis, subject, message)\n```\n\nSend email notification to project's analysts of projects.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_command": {"title": "Define shell command for an analysis run", "summary": "get_command must return a shell command string that will be executed for a given analysis. It receives the analysis object, resolved inputs (from get_dependencies), and application settings so the subclass can build the exact command to run.", "tags": ["command-generation", "execution", "application", "CLI"], "content": "# get_command\n\n```python\ndef get_command(self, analysis, inputs, settings)\n```\n\nMust return a shell command for the analysis as a string.\n\nArguments:\n    analysis (dict): an analysis object as retrieved from API.\n    inputs (dict): as returned by `get_dependencies`.\n    settings (dict): applications settings.\n\nReturns:\n    str: command", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_experiments_from_cli_options": {"title": "Map CLI options to experiment tuples", "summary": "get_experiments_from_cli_options converts parsed command-line options into a list of (targets, references) experiment tuples that the application should run on. Implementations must interpret CLI flags and selectors and return the target/reference groupings accordingly.", "tags": ["CLI-parsing", "experiments", "metadata", "selection"], "content": "# get_experiments_from_cli_options\n\n```python\ndef get_experiments_from_cli_options(self, **cli_options)\n```\n\nMust return list of target-reference experiment tuples given the parsed options.\n\nArguments:\n    cli_options (dict): parsed command line options.\n\nReturns:\n    list: of (targets, references) tuples.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_analysis_results": {"title": "Produce analysis results dictionary on completion", "summary": "get_analysis_results is a completion hook that should return a JSON-serializable dictionary of results for a finished analysis. It is called when an analysis succeeds and provides a standard place to extract summary metrics, output file locations, and other metadata to be stored by Isabl.", "tags": ["results", "completion-hook", "reporting", "api"], "content": "# get_analysis_results\n\n```python\ndef get_analysis_results(self, analysis)\n```\n\nGet dictionary of analysis results.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_after_completion_status": {"title": "Determine status after analysis completion", "summary": "get_after_completion_status returns the post-completion state for an analysis, limited to values such as FINISHED or IN_PROGRESS. This hook allows applications to indicate whether further work is expected after the primary job finishes.", "tags": ["status", "completion", "lifecycle"], "content": "# get_after_completion_status\n\n```python\ndef get_after_completion_status(self, analysis)\n```\n\nPossible values are FINISHED and IN_PROGRESS.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_settings": {"title": "Validate application settings and configuration", "summary": "validate_settings should assert that application settings are correctly configured and raise an AssertionError when misconfigured. It receives an ApplicationSettings object (Munch-like) and is used to fail fast if required parameters or resources are missing.", "tags": ["settings", "validation", "configuration", "errors"], "content": "# validate_settings\n\n```python\ndef validate_settings(self, settings)\n```\n\nValidate settings.\n\nMake sure application settings are valid by raising an AssertionError if\nsomething is properly configured.\n\nArguments:\n    settings (isabl_cli.settings.ApplicationSettings): an application settings\n    object, which is also a Munch-like dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_experiments": {"title": "Validate target and reference experiment combinations", "summary": "validate_experiments enforces that the combination of target and reference experiments makes sense for the application and should raise an AssertionError if not. This prevents nonsensical analyses (for example, running variant calling on imaging experiments) by using metadata-driven rules.", "tags": ["validation", "experiments", "metadata", "error-handling"], "content": "# validate_experiments\n\n```python\ndef validate_experiments(self, targets, references)\n```\n\nRaise AssertionError if tuple combination isn't valid.\n\nSome of the advantages of metadata-driven applications is that we can prevent\nanalyses that don't make sense, for example running a variant calling\napplication on imaging data.\n\nArguments:\n    targets (list): list of targets dictionaries.\n    references (list): list of references dictionaries.\n\nRaises:\n    AssertionError: if tuple is invalid.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_dependencies": {"title": "Resolve analysis dependencies before command generation", "summary": "get_dependencies is executed before get_command to collect and return inputs required by the analysis. It should return a tuple of (list of dependency primary keys, inputs dict) that the platform will use to wire dependencies and populate inputs for command construction.", "tags": ["dependencies", "inputs", "pipeline", "pre-processing"], "content": "# get_dependencies\n\n```python\ndef get_dependencies(self, targets, references, settings)\n```\n\nGet dictionary of inputs, this function is run before `get_command`.\n\nArguments:\n    targets (list): created analysis instance.\n    references (list): created analysis instance.\n    settings (object): settings namespace.\n\nReturns:\n    tuple: (list of analyses dependencies primary keys, inputs dict).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_project_analysis_results": {"title": "Collect project-level analysis results on completion", "summary": "get_project_analysis_results is a completion hook for project-level analyses that should return a JSON-serializable dictionary of aggregated results. It is used to summarize outcomes across multiple sample-level analyses at the project scope.", "tags": ["project-analysis", "aggregation", "results", "completion"], "content": "# get_project_analysis_results\n\n```python\ndef get_project_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a project level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:merge_project_analyses": {"title": "Merge project-level analyses into a single run", "summary": "Describes the merge_project_analyses hook that combines multiple succeeded analyses into a new project-level analysis. It explains that this method is only invoked when no other analysis of the same application is running or submitted, and provides argument expectations for implementing custom merge logic.", "tags": ["project-level", "merging", "hooks", "implementation"], "content": "# merge_project_analyses\n\n```python\ndef merge_project_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a project level basis.\n\nIf implemented, a new project level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the project level analysis.\n    analyses (list): list of succeeded analyses instances.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_project_analyses": {"title": "Validate whether project-level merge should run", "summary": "Documents validate_project_analyses, a hook that asserts whether project-level merge logic should proceed. If the validation fails, the method should raise an AssertionError to prevent further merge processing.", "tags": ["validation", "project-level", "assertions"], "content": "# validate_project_analyses\n\n```python\ndef validate_project_analyses(self, project, analyses)\n```\n\nRaise AssertionError if project level analysis logic shouldn't happen.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_individual_analysis_results": {"title": "Collect results for completed individual analysis", "summary": "Explains get_individual_analysis_results, which is executed when an individual-level analysis completes to return a JSON-serializable results dictionary. The function accepts the succeeded analysis instance and must return a dict of results that can be stored or consumed downstream.", "tags": ["i rns the assembly database object associated with the application (e.g., genome assembly reference). It is used to access assembly metadata required by analyses and pipelines.", "tags": ["assembly", "genome", "reference", "database"], "content": "# assembly\n\n```python\ndef assembly(self)\n```\n\nGet assembly database object.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:has_project_auto_merge": {"title": "Check if project-level auto-merge defined", "summary": "This boolean accessor returns True if the application defines project-level auto-merge logic. It's a quick check to determine whether project-wide merging behavior is configured for the application.", "tags": ["auto-merge", "project-level", "configuration", "boolean"], "content": "# has_project_auto_merge\n\n```python\ndef has_project_auto_merge(self)\n```\n\nReturn True if project level auto merge logic is defined.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:has_individual_auto_merge": {"title": "Check if individual-level auto-merge enabled", "summary": "This method returns True when individual-level auto-merge behavior is defined for the application. It allows callers to detect whether automatic merging at the individual/sample level will be applied.", "tags": ["auto-merge", "individual-level", "configuration", "boolean"], "content": "# has_individual_auto_merge\n\n```python\ndef has_individual_auto_merge(self)\n```\n\nReturn True if individual level auto merge logic is defined.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:as_cli_command": {"title": "Expose application as click CLI command", "summary": "This class method returns the application wrapped as a Click command-line interface entry point. It enables the application to be registered and executed as a CLI command with Click's tooling.", "ta ntain single data type", "summary": "Ensures that all raw data for the supplied experiments are of the same data type (for example, all FASTQ or all BAM) so that a single pipeline can be selected and executed. This avoids mixing incompatible input types in a single job submission.", "tags": ["data-type", "validation", "experiments", "pipeline-selection"], "content": "# validate_single_data_type\n\n```python\ndef validate_single_data_type(self, experiments)\n```\n\nValidate experiments have only one type of raw data.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_fastq_only": {"title": "Confirm raw data are FASTQ files only", "summary": "Validates that the raw data associated with the given experiments are exclusively FASTQ files. This check is intended for tools and workflows that require FASTQ input and will block runs if other file types are present.", "tags": ["FASTQ", "raw-data", "validation", "input-format"], "content": "# validate_fastq_only\n\n```python\ndef validate_fastq_only(self, experiments)\n```\n\nValidate raw data is only fastq.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_is_pair": {"title": "Validate that targets and references form a pair", "summary": "Checks that the provided targets and references represent paired entries (e.g., an equal-length tuple or matched pairing) required for pairwise analyses. This ensures correctness for workflows that compare each target to a corresponding reference.", "tags": ["pairing", "targets", "references", "validation"], "content": "# validate_is_pair\n\n```python\ndef validate_is_pair(self, targets, references)\n```\n\nValidate targets, references tuple is a pair.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_one_target": {"title": "Enforce exactly one target sample provided", "s ng.", "tags": ["BAM", "alignments", "storage"], "content": "# get_bams\n\n```python\ndef get_bams(filters, assembly, verbose, identifiers)\n```\n\nGet storage directories, use `pattern` to match files inside dirs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:rerun_signals": {"title": "Rerun failed asynchronous signals (jobs) selectively", "summary": "Documents rerun_signals(filters) which triggers reruns of previously failed signals based on provided filters. This is useful for recovering from transient failures in asynchronous tasks managed by the Isabl signaling system.", "tags": ["signals", "job-management", "retry"], "content": "# rerun_signals\n\n```python\ndef rerun_signals(filters)\n```\n\nRerun failed signals.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:run_web_signals": {"title": "Execute signals triggered from the web frontend", "summary": "Explains run_web_signals(filters) which runs signals that were initiated via the Isabl frontend, optionally constrained by filters. This bridges frontend-triggered events to backend signal execution for tasks such as reprocessing or manual starts.", "tags": ["web", "signals", "frontend-integration"], "content": "# run_web_signals\n\n```python\ndef run_web_signals(filters)\n```\n\nRun signals triggered from the frontend.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:run_signals": {"title": "Run arbitrary signals on analyses or experiments", "summary": "Defines a CLI function to execute arbitrary signals against analyses or experiments by using import strings. The function accepts an endpoint, filter criteria, and a list of signals to run, allowing targeted programmatic triggers inside Isabl.", "tags": ["signals", "cli", "automation", "analyses"], "content": "# run_signals\n\n```pyth m_url)\n```\n\nUpdate default bam for a experiment given the assembly.\n\nArguments:\n    experiment (dict): experiment dict.\n    assembly_name (str): assembly name.\n    analysis_pk (int): analysis primary key.\n    bam_url (str): bam url.\n\nReturns:\n    dict: patched experiment instance", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink_experiment_to_projects": {"title": "Create symlinks from experiments into projects", "summary": "Creates filesystem symbolic links from an experiment directory into one or more project directories. This utility helps expose experiment data inside project-level directory structures for downstream access and workflows.", "tags": ["symlink", "experiments", "filesystem", "projects"], "content": "# symlink_experiment_to_projects\n\n```python\ndef symlink_experiment_to_projects(experiment)\n```\n\nCreate symlink from experiment directory and projects directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink_analysis_to_targets": {"title": "Create symlinks from analyses to configured targets", "summary": "Creates symbolic links for an analysis into configured target directories (for example project or delivery locations). This function automates exposing analysis outputs where other systems or users expect them.", "tags": ["symlink", "analyses", "filesystem", "delivery"], "content": "# symlink_analysis_to_targets\n\n```python\ndef symlink_analysis_to_targets(analysis)\n```\n\nCreate symlink from experiment directory and projects directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:trigger_analyses_merge": {"title": "Trigger project-level analyses merge when necessary", "summary": "Submits a merge job for project-level analyses when required. This helper checks conditions and triggers consolidation of analyses across a project to produce merged representations.", "tags": ["merge", "analyses", "projects", "workflow"], "content": "# trigger_analyses_merge\n\n```python\ndef trigger_analyses_merge(analysis)\n```\n\nSubmit project level analyses merge if neccessary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:trash_analysis_storage": {"title": "Move an analysis storage URL to trash directory", "summary": "Moves an analysis' storage_url into a designated trash directory for cleanup or soft-deletion. This function is intended to remove active storage references while preserving data in a trash area for recovery or auditing.", "tags": ["storage", "cleanup", "analyses", "filesystem"], "content": "# trash_analysis_storage\n\n```python\ndef trash_analysis_storage(analysis)\n```\n\nMove analysis `storage_url` to a trash directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:_make_storage_directory": {"title": "Construct and create hierarchical storage directories", "summary": "Computes and creates a filesystem path for data storage using a root, base, and identifier. Optionally uses a hashed layout by splitting the identifier into subdirectories derived from the last four digits to avoid large flat directories.", "tags": ["storage", "paths", "filesystem", "organization"], "content": "# _make_storage_directory\n\n```python\ndef _make_storage_directory(root, base, identifier, use_hash=False)\n```\n\nGet and create path to a data directory.\n\nThe path is set to:\n\n    <root>/<base>/<identifier>\n\nIf `use_hash`, identifier must be integer and path is build using the\nfour last digits of the identifier. Say identifiers is 12345, then path is:\n\n    <root>/<base>/23/45/12345\n\nArguments:\n    base (str): instance's API base.\n    identifier (str): instance's primary key.\n    root (str): root directory.\n    use_hash (bool): hash integer identifier for directories.\n\nReturns:\n    str: path to instance's data directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_storage_url": {"title": "Create storage directory and return patched instance", "summary": "Creates the appropriate storage directory for an instance and returns the patched instance with the storage URL. The function takes an API endpoint, an identifier, and an optional use_hash flag to control directory layout.", "tags": ["storage", "api", "paths", "instances"], "content": "# get_storage_url\n\n```python\ndef get_storage_url(endpoint, identifier, use_hash=False)\n```\n\nMake storage directory and return patched instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:update_storage_url": {"title": "Update storage URL and create storage directory", "summary": "A helper function that creates a storage directory for an instance and patches the instance via the API, returning the updated object. It takes an API endpoint, an identifier and optional data payload and hashing flag to compute or modify the storage URL before persisting the change.", "tags": ["storage", "API", "filesystem", "instance-management"], "content": "# update_storage_url\n\n```python\ndef update_storage_url(endpoint, identifier, use_hash=False, **data)\n```\n\nMake storage directory and return patched instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalReferenceDataImporter": {"title": "Local reference data importer for assemblies and techniques", "summary": "An import engine class used to register reference resources (e.g., reference data files) for an assembly or technique. The class exposes import_data to move or symlink local reference data into Isabl storage and as_cli_command to expose the importer via a Click-based CLI.", "tags": ["reference-data", "importer", "assemblies", "CLI"], "content": "# class LocalReferenceDataImporter\n\nAn import engine for assemblies' reference_data.\n\n## Methods\n\n### import_data\n\n```python\ndef import_data(cls, identifier, data_src, data_id, symlink, description, sub_dir=None, model='assemblies')\n```\n\nRegister reference resources for a given assembly.\n\nArguments:\n    identifier (str): name of assembly or technique.\n    model (str): either `techniques` or `assemblies`.\n    data_src (str): path to reference data.\n    data_id (str): identifier that will be used for reference data.\n    symlink (str): symlink instead of move.\n    description (str): reference data description.\n    sub_dir (str): target sub dir for the resource, default is data_id.\n\nReturns:\n    dict: updated assembly instance as retrieved from API.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet reference data importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalReferenceGenomeImporter": {"title": "Local reference genome importer CLI interface", "summary": "A minimal import engine specialized for importing a reference genome for an assembly. The class provides an as_cli_command method so the genome importer can be invoked from the command line via Click.", "tags": ["reference-genome", "importer", "assemblies", "CLI"], "content": "# class LocalReferenceGenomeImporter\n\nAn import engine for an assembly reference genome.\n\n## Methods\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet reference data importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalBedImporter": {"title": "Local BED importer for techniques with processing", "summary": "An importer class for technique BED files that can preprocess BED files (sort, bgzip, tabix) and register them in a technique's storage directory. It offers process_bedfile to prepare the file and import_bedfiles to register targets/baits, assembly and species metadata, and update the technique instance via the API, plus a CLI wrapper.", "tags": ["BED", "importer", "tabix", "techniques"], "content": "# class LocalBedImporter\n\nAn import engine for Technique BED files.\n\n## Methods\n\n### process_bedfile\n\n```python\ndef process_bedfile(path)\n```\n\nSort, tabix and gzip a bedfile.\n\n### import_bedfiles\n\n```python\ndef import_bedfiles(cls, technique, targets_path, baits_path, assembly, species, description=None)\n```\n\nRegister input_bed_path in technique's storage dir and update `data`.\n\nArguments:\n    technique (str): technique slug.\n    targets_path (str): path to targets bedfile.\n    baits_path (str): path to baits bedfile.\n    assembly (str): name of reference genome for bedfile.\n    species (str): name of genome species.\n    description (str): a description of the BED files.\n\nReturns:\n    dict: updated technique instance as retrieved from API.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet bed importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalDataImporter": {"title": "Local data importer for experiment raw files", "summary": "A comprehensive data import engine for associating raw data files with experiments. It supports directory traversal, pattern matching, multiple data types (BAM, FASTQ, images, etc.), ownership and readability checks, options to copy/symlink/move, per-file annotations, and returns a summary plus updated experiment entries after committing.", "tags": ["data-import", "experiments", "file-management", "validation"], "content": "# class LocalDataImporter\n\nA Data import engine for experiments.\n\nAttributes:\n    RAW_DATA_INSPECTORS (list): list of functions which argument is a path and\n        are tasked to return the data type of supported formats.\n\n## Methods\n\n### annotate_file_data\n\n```python\ndef annotate_file_data(self, experiment, file_data, file_type, src, dst)\n```\n\nOverwrite this method to provide custom file_data annotations.\n\n### import_data\n\n```python\ndef import_data(self, directories, symlink=False, commit=False, key=lambda x: x['system_id'], files_data=None, dtypes=None, iexact=False, ignore_ownership=False, copy=False, **filters)\n```\n\nImport raw data for multiple experiments.\n\nExperiments's `storage_url`, `storage_usage`, `raw_data` are\nupdated.\n\nArguments:\n    directories (list): list of directories to be recursively explored.\n    copy (bool): if True files are copied intead of moved.\n    symlink (bool): if True symlink instead of moving.\n    commit (bool): if True perform import operation.\n    key (function): given a experiment dict returns id to match.\n    filters (dict): key value pairs to use as API query params.\n    dtypes (list): data types that should be matched (e.g. BAM, PNG. etc.).\n    iexact (bool): case insensitive match of identifiers.\n    ignore_ownership (bool): raise error if files not owned by admin user.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other,\n        see also annotate_file_data.\n\nRaises:\n    click.UsageError: if `key` returns the same identifier for multiple\n        experiments. If a experiment matches both fastq and bam files.\n        if cant determine read 1 or read 2 from matched fastq files.\n\nReturns:\n    tuple: list of experiments for which data has been matched and a\n        summary of the operation.\n\n### check_ownership\n\n```python\ndef check_ownership(cache)\n```\n\nMake sure files matched are owned by current user.\n\n### check_are_readable\n\n```python\ndef check_are_readable(cache)\n```\n\nMake sure files matched can be accessed and read.\n\n### match_path\n\n```python\ndef match_path(self, path, pattern)\n```\n\nMatch `path` with `pattern` and update cache if fastq or bam.\n\n### import_files\n\n```python\ndef import_files(self, instance, files, files_data, symlink, copy)\n```\n\nMove/link files into instance's `storage_url` and update database.\n\nArguments:\n    instance (dict): experiment instance.\n    files (dict): list of files to be imported.\n    copy (bool): if True files are copied intead of moved.\n    symlink (dict): whether to symlink or move the data.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other.\n\nRaises:\n    click.UsageError: if multiple data formats are found.\n\nReturns:\n    dict: patched experiment instance.\n\n### get_regex_pattern\n\n```python\ndef get_regex_pattern(group_name, identifier, iexact=False)\n```\n\nGet regex pattern for `identifier` group as `group_name`.\n\nThis pattern treats dashes, underscores and dots equally.\n\nArguments:\n    group_name (str): regex pattern group name.\n    identifier (str): identifier to be matched by regex.\n    iexact (bool): use case insensitive match.\n\nReturns:\n    str: a regex pattern.\n\n### get_summary\n\n```python\ndef get_summary(cache)\n```\n\nGet a summary of the matched, skipped, and missing files.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet data importer as a click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:echo_src_dst": {"title": "Echo source-to-destination informational message", "summary": "A small utility function that prints an informational message describing a source path and its destination (src -> dst). It is used to log or display file move/link/copy operations to the user.", "tags": ["logging", "utils", "user-feedback"], "content": "# echo_src_dst\n\n```python\ndef echo_src_dst(msg, src, dst)\n```\n\nPrint a src to dst msg.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink": {"title": "Create symbolic link helper function", "summary": "A helper function that creates a symbolic link from a given source path to a destination path. This is used by importers when the symlink option is selected instead of moving or copying data.", "tags": ["filesystem", "symlink", "utils"], "content": "# symlink\n\n```python\ndef symlink(src, dst)\n```\n\nCreate symlink from `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:move": {"title": "Move (rename) file or directory helper function", "summary": "A utility function that renames (moves) a file or directory from src to dst. It is used by import routines when files are intended to be relocated into Isabl storage rather than copied or linked.", "tags": ["filesystem", "move", "utils"], "content": "# move\n\n```python\ndef move(src, dst)\n```\n\nRename `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:copy": {"title": "Copy files helper function for imports", "summary": "A small utility to copy files from a source location to a destination. It supports import workflows where the original data must be preserved and a duplicate placed into Isabl storage.", "tags": ["filesystem", "copy", "utils"], "content": "# copy\n\n```python\ndef copy(src, dst)\n```\n\nCopy files from `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_data": {"title": "Bulk raw data importer for multiple experiments", "summary": "Imports raw files for many experiments by scanning directories, matching files to experiments, and optionally moving, copying, or symlinking them into storage. It updates experiments' storage metadata (storage_url, storage_usage, raw_data), supports filtering by data types, and has a commit flag to perform or dry-run the operation.", "tags": ["import", "raw-data", "batch-processing", "file-matching"], "content": "# import_data\n\n```python\ndef import_data(self, directories, symlink=False, commit=False, key=lambda x: x['system_id'], files_data=None, dtypes=None, iexact=False, ignore_ownership=False, copy=False, **filters)\n```\n\nImport raw data for multiple experiments.\n\nExperiments's `storage_url`, `storage_usage`, `raw_data` are\nupdated.\n\nArguments:\n    directories (list): list of directories to be recursively explored.\n    copy (bool): if True files are copied intead of moved.\n    symlink (bool): if True symlink instead of moving.\n    commit (bool): if True perform import operation.\n    key (function): given a experiment dict returns id to match.\n    filters (dict): key value pairs to use as API query params.\n    dtypes (list): data types that should be matched (e.g. BAM, PNG. etc.).\n    iexact (bool): case insensitive match of identifiers.\n    ignore_ownership (bool): raise error if files not owned by admin user.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other,\n        see also annotate_file_data.\n\nRaises:\n    click.UsageError: if `key` returns the same identifier for multiple\n        experiments. If a experiment matches both fastq and bam files.\n        if cant determine read 1 or read 2 from matched fastq files.\n\nReturns:\n    tuple: list of experiments for which data has been matched and a\n        summary of the operation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:as_cli_command": {"title": "Create Click CLI wrapper for data importers", "summary": "Provides a helper to produce a Click command for a data importer class so it can be executed from the command line. Standardizes the CLI interface for different importers and reduces repetitive boilerplate. Ensures consistent option parsing and invocation patterns across import utilities.", "tags": ["click", "cli-tooling", "developer-tools"], "content": "# as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet data importer as a click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:process_bedfile": {"title": "Sort, compress and index BED files", "summary": "Utility function that sorts a BED file, compresses it with bgzip, and creates a tabix index. It prepares BED files for efficient querying and downstream usage in genomic workflows.", "tags": ["bed", "tabix", "compression", "preprocessing"], "content": "# process_bedfile\n\n```python\ndef process_bedfile(path)\n```\n\nSort, tabix and gzip a bedfile.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_bedfiles": {"title": "Register BED files to technique storage", "summary": "Registers targets and baits BED files into a technique's storage directory and updates the technique's data record via the API. It accepts assembly, species and optional description metadata and returns the updated technique object.", "tags": ["bed", "technique", "registration", "api"], "content": "# import_bedfiles\n\n```python\ndef import_bedfiles(cls, technique, targets_path, baits_path, assembly, species, description=None)\n```\n\nRegister input_bed_path in technique's storage dir and update `data`.\n\nArguments:\n    technique (str): technique slug.\n    targets_path (str): path to targets bedfile.\n    baits_path (str): path to baits bedfile.\n    assembly (str): name of reference genome for bedfile.\n    species (str): name of genome species.\n    description (str): a description of the BED files.\n\nReturns:\n    dict: updated technique instance as retrieved from API.", "source_url": "https://github.com/papaemmelab/
