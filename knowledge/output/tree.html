r run [pytest](https://docs.pytest.org/en/latest/), [pylint](https://www.pylint.org/) or [pydocstyle](http://www.pydocstyle.org/en) individually:\n\n Copy\n```\ndocker-compose run --rm django pytest --ds example.settings --cov=isabl_api\n docker-compose run --rm django pylint isabl_api\n docker-compose run --rm django pydocstyle isabl_api\n```  \n\n#### [](https://docs.isabl.io/contributing-guide#create-a-superuser)\n\nCreate a superuser\n\nCreate a superuser with username and password set to `admin` (we will need it later):\n\nCopy\n```\ndocker-compose run --rm django python manage.py migrate\ndocker-compose run --rm django python manage.py createsuperuser --email [email\u00a0protected] --username admin\n```\n\n#### [](https://docs.isabl.io/contributing-guide#start-the-backend)\n\nStart the backend\n\nNow you can login in the frontend at [http://localhost:8000](http://localhost:8000/) (there won't be much to see). An easy way to create objects is to run the [client](https://docs.isabl.io/contributing-guide#isabl-cli) tests.\n\n#### [](https://docs.isabl.io/contributing-guide#coverage-report)\n\nCoverage report\n\nSince tests were run inside a container, we need to combine the coverages to see the html report:\n\n## [](https://docs.isabl.io/contributing-guide#isabl-cli)\n\nIsabl CLI\n\n1.     Clone locally: \n2.     Install with pip, it is strongly recommended to install in a [virtual environment](https://docs.python.org/3/tutorial/venv.html): \n3.     Run tests using [tox](http://tox.readthedocs.io/), make sure you created the admin user:\n\nOr run [pytest](https://docs.pytest.org/en/latest/), [pylint](https://www.pylint.org/) or [pydocstyle](http://www.pydocstyle.org/en) individually: \n\n**Note:** if your changes depend on a particular branch of Isabl API, make sure both Isabl CLI and Isabl API branches are called the same so that the travis configuration can pick that up.\n\n## [](https://docs.isabl.io/contributing-guide#isabl-web)\n\nIsabl Web\n\n1.     Clone locally: \n2.     Install yarn: \n3.     Install dependencies: \n4.     Start the react development server:\n\n**Important!** export `FRONTEND_URL=localhost:8080` before running `docker-compose up` in the api repository, note that the port may vary. \n\n## [](https://docs.isabl.io/contributing-guide#documentation)\n\nDocumentation\n\nSimply create a PR in [github](https://github.com/isabl-io/docs):\n\n## [](https://docs.isabl.io/contributing-guide#contribute-with-github)\n\nContribute with Github\n\n1.     Create a branch for local development and get ready to make changes locally: \n2.     Commit your changes and push your branch to GitHub (see the emoji reference): \n3.     Create a test in: \n4.     Submit a pull request through the GitHub website. \n\n### [](https://docs.isabl.io/contributing-guide#formatting-projects)\n\nFormatting projects\n\nPython Projects are formatted with [black](https://github.com/ambv/black). Is required for `api`, `cli` and `apps`, simply run:\n\nProject `web` is formatted following the [Vue style guide](https://vuejs.org/v2/style-guide/). For this one, simply run:\n\n### [](https://docs.isabl.io/contributing-guide#bumping-version-of-pypi)\n\nBumping version of PyPi\n\nFollowing the [semantic versioning](http://semver.org/) guidelines and update the `VERSION` file before creating a PR, for instance:\n\n### [](https://docs.isabl.io/contributing-guide#emoji-reference)\n\nEmoji reference\n\nWe use emojis to quickly categorize commits and pull requests. These are some common type of changes we use but feel free to ignore the conventions:\n\nemoji\n\nname\n\ntype of change\n\n\ud83d\ude80\n\nrocket\n\nnew feature\n\n\ud83d\udc1b\n\nbug\n\nbug fix\n\n\ud83d\udcdd\n\nmemo\n\nchanges to documentation\n\n\ud83c\udfa8\n\nart\n\nformatting no code change\n\n\ud83d\udd27\n\nwrench\n\nrefactoring production code\n\n\u2705\n\nwhite_check_mark\n\nadding/editing test logic\n\n\ud83d\udc55\n\nshirt\n\nno production code change\n\n\ud83d\udc8e\n\ngem\n\nbump to new version\n\n**Tip:** To insert an emoji in mac type `control+cmd+space`. Alternative, type the emoji's name within two semicolons (e.g. `:rocket:`).\n\n[Previous Batch Systems](https://docs.isabl.io/batch-systems)[Next Other CLI commands](https://docs.isabl.io/other-cli-commands)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Isabl API](https://docs.isabl.io/contributing-guide#isabl-api)\n*   [Isabl CLI](https://docs.isabl.io/contributing-guide#isabl-cli)\n*   [Isabl Web](https://docs.isabl.io/contributing-guide#isabl-web)\n*   [Documentation](https://docs.isabl.io/contributing-guide#documentation)\n*   [Contribute with Github](https://docs.isabl.io/contributing-guide#contribute-with-github)\n*   [Formatting projects](https://docs.isabl.io/contributing-guide#formatting-projects)\n*   [Bumping version of PyPi](https://docs.isabl.io/contributing-guide#bumping-version-of-pypi)\n*   [Emoji reference](https://docs.isabl.io/contributing-guide#emoji-reference)\n\nWas this helpful?\n\nCopy`docker-compose up`\n\nCopy\n```\nalias opencov=\"mv .coverage .coverage.tmp && coverage combine && coverage html && open htmlcov/index.html\"\npip install coverage && opencov\n```\n\nCopy\n```\ngit clone [email\u00a0protected]:papaemmelab/isabl_cli.git\n cd cli\n```\n\nCopy`pip install -r requirements.txt`\n\nCopy`tox`\n\nCopy\n```\npy.test tests/ --cov=isabl_cli -s\n pylint isabl_cli\n pydocstyle isabl_cli\n```\n\nCopy\n```\ngit clone [email\u00a0protected]:papaemmelab/isabl_web.git\n cd web\n```\n\nCopy`brew install yarn --without-node`\n\nCopy`yarn install`\n\nCopy`yarn serve`\n\nCopy`git clone [email\u00a0protected]:isabl/docs.git`\n\nCopy\n```\ngit pull\n git checkout -b name-of-your-bugfix-or-feature\n```\n\nCopy\n```\ngit add .\n git config commit.template .gitmessage\n git commit -m \":emoji: your short and nice description\"\n git push origin name-of-your-bugfix-or-feature\n```\n\nCopy`tests/`\n\nCopy`pip install black && black .`\n\nCopy`yarn lint`\n\nCopy\n```\necho v0.1.0 > isabl_api/VERSION\ngit add isabl_api/VERSION\ngit commit -m \":gem: bump to version 0.1.0\"\n```", "source_url": "https://docs.isabl.io/contributing-guide"}, "docs/data-model": {"title": "Data Model: Individuals, Samples, and Experiments", "summary": "Explains Isabl's normalized data model where Individuals have Samples and Samples have Experiments, reducing redundancy and improving integrity. The document describes relationships, unique constraints, and provides a database diagram to show how metadata should be registered prior to importing data.", "tags": ["data-model", "metadata", "samples", "experiments"], "content": "# Registering Metadata | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Registering Metadata\n\n\ud83c\udff7 Create Individuals, Samples, and Experiments before importing data.\n\n## [](https://docs.isabl.io/data-model#isabl-data-model)\n\nIsabl Data Model\n\n`Isabl` models a data generation process where _Experiments_ such as Whole Genome Sequencing are performed on _Samples_ collected from different _Individuals_. This normalization approach reduces data redundancy and improves data integrity.\n\nData Generation Process\n\nUnique Together Constraints\n\nDatabase Diagram\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fuser-images.githubusercontent.com%2F8843150%2F62899450-c77fec80-bd25-11e9-9d92-dc2758cb49d2.png&width=768&dpr=3&quality=100&sign=405ef7ef&sv=2)\n\nUnique together constraints enable Isabl link new samples and experiments to existing records in the database. The following fields are enforced to be unique together across the entire system:\n\nDatabase Schema\n\nUnique Together Fields\n\n**Individual**\n\n*     Center \n*     Species \n*     Identifier \n\n**Samples**\n\n*     Individual \n*     Sample Class \n*     Identifier \n\n**Aliquots**\n\n*     Sample \n*     Identifier \n\n**Experiments**\n\n*     Sample \n*     Aliquot ID \n*     Technique \n*     Identifier \n\n**Applications**\n\n*     Name \n*     Version \n*     Species \n*     Assembly \n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vSwWHBNAC_xh7IjDKaXnh0c4PN0cg1RopPG0_s9jHS2Jg1Zg4P3o4b0qU9tJ-5dQQhH9bTht4p3etGH%2Fpub%3Fw%3D2512%26h%3D3263&width=768&dpr=3&quality=100&sign=5ef4a411&sv=2)\n\nThe concept of cohorts, where multiple _Experiments_ are grouped and analyzed together, is fundamental and well supported. Furthermore, `isabl` also tracks and executes _Assembly_ aware _Bioinformatics Applications_ making sure that results are a function of the reference genome. Instances of these applications are also tracked and referred as _Analyses_.\n\n![Image 7](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fuser-images.githubusercontent.com%2F8843150%2F62899485-dc5c8000-bd25-11e9-894e-664f11028d20.png&width=768&dpr=3&quality=100&sign=18d37bb4&sv=2)\n\n## [](https://docs.isabl.io/data-model#metadata-registration)\n\nMetadata Registration\n\nIsabl offer different mechanisms for metadata registration.\n\n![Image 8](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fuser-images.githubusercontent.com%2F8843150%2F62899505-eb433280-bd25-11e9-9c8d-2267d7092b36.png&width=768&dpr=3&quality=100&sign=eabf6a29&sv=2)\n\nOnly users with the proper permissions or _superusers_ can create or modify models in the database, by using any of the methods for metadata registration.\n\nWhen using the web interface, available buttons such as **Create New Submission (+)** may be hidden depending of your user role. If you're not seeing this feature, or your getting _permission denied_ using the API, please contact your `isabl` administrators.\n\n### [](https://docs.isabl.io/data-model#adding-extra-choices)\n\nAdding Extra Choices\n\nIf you need more choices for `species`, `gender`, sample `category`, and technique `methods`, please refer to the [extra choices documentation](https://docs.isabl.io/isabl-settings#extra-choices-settings).\n\n### [](https://docs.isabl.io/data-model#sync-diseases-with-onco-tree)\n\nSync Diseases with Onco Tree\n\nIf you are working with Cancer, you can create sync Isabl Diseases with [Onco Tree](http://oncotree.mskcc.org/#/home). Simply run:\n\n## [](https://docs.isabl.io/data-model#register-samples-with-excel)\n\nRegister Samples with Excel\n\nThrough the web interface, is possible to import an _Excel Submission_ to register new samples.\n\nNote that this feature is limited to create only new _Individuals_, _Samples_ and _Experiments_. If you need to create _Centers_, _Diseases_, _Techniques_, _Platforms_, for your available choices you need to use the **Admin** interface at `http://<your-isabl-host>/admin/`or the [API method](https://docs.isabl.io/data-model#register-samples-with-restful-api-and-cli).\n\nBy clicking in **Create New Submission** button in the top right menu of the user, or by clicking in **Add Batch Samples** in the top right button of the Project view.\n\n![Image 9](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vTnj1KCwWgfTPLqedUc13XX6wCNshQGDWi-VA8gmh7oXX6tDzNXQGfVzHAXGmaAJfXcskFTPrNEfW9o%2Fpub%3Fw%3D1276%26h%3D267&width=768&dpr=3&quality=100&sign=a802af5f&sv=2)\n\nIt will open a modal where you can download the latest _Submission_ form by clicking **GET FORM.** By latest, it means it will be updated with the available custom fields, and available choices added to options like: center, diseases, platforms and techniques.\n\nWhen prompted to allow _macros_, say yes. This will enable you to toggle between optional and required columns.\n\n![Image 10](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vQ3WHDsObpa2x9vLV4vORr6HeK_xSbSFLgMnAFP44OPVvxE_ABIoSX1NcwQgf-hf42nimp8gPWVfb-t%2Fpub%3Fw%3D2256%26h%3D498&width=768&dpr=3&quality=100&sign=aab9a991&sv=2)\n\nMetadata can be registered using Excel Submission forms.\n\nAfter the submission is created it can be uploaded through the web interface and a preliminary summary from the metadata submitted will be shown. This Information about the number of models that will be created (i.e. _1 Individual, 2 Samples, 4 Experiments_) or errors in the submission form fields (i.e. _Error: individual gender FMALE is not a valid choice_) guides you in the submission process, before you can commit it.\n\nAfter uploading the submission file, if you don't get any validation errors and your summary looks correct, hit the **Commit Submission** button to register the submission and make definitive changes in the database.\n\n![Image 11](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-Lh6AHTmTjTgIlD8cIM1%252F-Lh6AS2RG3s-qgQoxWoU%252Fweb_submit_form.gif%3Falt%3Dmedia%26token%3D77bd0ca1-791b-4278-a3ba-001266898a34&width=768&dpr=3&quality=100&sign=6e14c3d2&sv=2)\n\nAfter committing your _Submission,_ your new available samples should've been created by now, and you can visualize in the _Sample Tree_ the relationship between the new models you just registered.\n\n![Image 12](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-LhgBzCtWex6wkVUbGcW%252F-LhgHqP6DuYKftqV67EG%252FScreen%2520Shot%25202019-06-18%2520at%25204.28.47%2520PM.png%3Falt%3Dmedia%26token%3D93ba3292-baa2-4c6d-b62d-0da7ebe55093&width=768&dpr=3&quality=100&sign=72f259ec&sv=2)\n\nSample Tree of the new registered samples.\n\n## [](https://docs.isabl.io/data-model#register-samples-with-restful-api-and-cli)\n\nRegister Samples with RESTful API and CLI\n\n`Isabl` comes with a comprehensive RESTful API reference, where you can learn how to use every available endpoint for each resource of the database. You can access it by browsing to `http://<your-isabl-host>/api/v1/`\n\n![Image 13](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-Lh0vZ0JkgDveBbbp9oL%252F-Lh0wz_FbRqJ9QIkJHDL%252Fapi.gif%3Falt%3Dmedia%26token%3D64a5073e-b244-450d-b7f8-70a6c8f7198e&width=768&dpr=3&quality=100&sign=9a32a0ed&sv=2)\n\nSwagger API Documentation\n\nCreate endpoints are _get or create_, they try to retrieve existing objects using either the _primary key_ field or _unique together constraints_, and if it doesn't find a match creates a new object. If the view supports nested objects, these will also be retrieved or created using the same criteria.\n\n**IMPORTANT**: If an existing object is retrieved, its fields won't be updated with the posted data.\n\nLet's say you want to create a new _Individual._ According to the API documentation, we need to provide at species, gender, an identifier, and the center associated with the individual. Note that `center` is a _nested_ object, you may need to create a new one or query an existing one. Let's say you want to get an existing one. This is how you'd do it with `isabl_cli`:\n\nYou can also make http requests directly to the API (you can create a new token from the admin site):\n\n## [](https://docs.isabl.io/data-model#manage-user-groups-and-permissions)\n\nManage User Groups and Permissions\n\nIsabl offers an optional configuration of groups that you can adopt:\n\nGroup\n\nPermissions\n\n**Managers**\n\nCan create, update, and delete Custom Fields, Individuals, Centers, Diseases, Experiments, Techniques, Platforms, Projects, and Submissions.\n\n**Analysts**\n\nCan create, update, and delete Custom Fields, Applications, Analyses, and Assemblies. They can also download analyses results.\n\n**Engineers**\n\nEngineers have the same permissions of both managers and analysts.\n\nIn order to create these groups run the following command:\n\nThese groups are **optional** and you can create your own using the Django Admin.\n\n**Pro tip:**use the `Can Download Results` permission to configure what users can download analyses results in your Isabl instance.\n\n[Previous Quick Start](https://docs.isabl.io/quick-start)[Next Importing Data](https://docs.isabl.io/import-data)\n\nLast updated 3 years ago\n\nWas this helpful?\n\n*   [Isabl Data Model](https://docs.isabl.io/data-model#isabl-data-model)\n*   [Metadata Registration](https://docs.isabl.io/data-model#metadata-registration)\n*   [Adding Extra Choices](https://docs.isabl.io/data-model#adding-extra-choices)\n*   [Sync Diseases with Onco Tree](https://docs.isabl.io/data-model#sync-diseases-with-onco-tree)\n*   [Register Samples with Excel](https://docs.isabl.io/data-model#register-samples-with-excel)\n*   [Register Samples with RESTful API and CLI](https://docs.isabl.io/data-model#register-samples-with-restful-api-and-cli)\n*   [Manage User Groups and Permissions](https://docs.isabl.io/data-model#manage-user-groups-and-permissions)\n\nWas this helpful?\n\nCopy\n```\n# you can find more onco tree versions at http://oncotree.mskcc.org\npython ./manage.py sync_oncotree --oncotree-version oncotree_2019_03_01\n```\n\nUsing Isabl SDK\n\nCopy\n```\nimport isabl_cli as ii\n\ncenter = ii.get_instance(\n    'centers',\n    'MEMORIAL SLOAN KETTERING (MSK)',\n)\nindividual = ii.create_instance(\n    'individuals',\n    identifier = 'EXTERNAL_ID_1',\n    species = 'HUMAN',\n    gender = 'FEMALE',\n    center = center,\n)\n```\n\nA request to the API\n\nCopy\n```\n# get token for authentication\ncurl  -X POST  \\\n    -d '{ \"username\": <your-username>, \"password\": <your-password> }'\n    -H \"Content-Type: application/json\"  \\\n    http://<your-isabl-host>/api/v1/rest-auth/login/\n\n# create individual\ncurl \\\n    -X POST \\\n    -H 'Authorization: Token <your-token>' \\\n    -H \"Content-Type: application/json\" \\\n    -d '{\"identifier\": \"EXTERNAL_ID_1\", \"species\": \"HUMAN\", \"gender\": \"FEMALE\", \"center\": {\"acronym\": \"MSK\", \"name\": \"MEMORIAL SLOAN KETTERING\" } }' \\\n    http://<your-isabl-host>/api/v1/individuals\n```\n\nCopy`python manage.py create_default_groups`", "source_url": "https://docs.isabl.io/data-model"}, "docs/import-data": {"title": "Importing Raw Data with Isabl-CLI", "summary": "Describes how Isabl-CLI discovers and imports raw data by matching files to registered metadata and moving/symlinking them into a scalable storage layout. It documents supported default raw formats, how to extend formats (EXTRA_RAW_DATA_FORMATS), storage hashing for experiment paths, and explicit YAML-based imports with the relevant CLI flags.", "tags": ["data-import", "cli", "raw-formats", "storage-layout"], "content": "\u2318Ctrl k\n\n## Importing Data\n\n\ud83d\udce6 Learn how to import raw data into Isabl using existing metadata.\n\nIsabl-CLI enables tracking and managing of raw data, as well as reference resources that are a function of a _genome assembly_ or an _experimental technique_.\n\nIsabl-CLI supports automated data import by recursively exploring data deposition directories and matching raw data files with identifiers registered in the database. For example, the client can be instructed to explore the `/projects` directory (**A**), retrieving only samples from _Project 393_, and match files using _Sample Identifiers_ (**B**).\n\nUpon `--commit`, Isabl-CLI proceeds to move (or symlink) matched files into scalable directory structures (**C**). The experiments data path is created by hashing the four last digits of the its primary key. For instance, data for Experiment 57395 will be stored at `{storage-directory}/experiments/73/95/57395/`. This hashing approach ensures a maximum of 1000 subdirectories in any folder at a worst case scenario of 10 million experiments.\n\nIsabl experiments can be linked to any kind of data. Be default Isabl will match the following data types:\n\n```\nRAW_DATA_FORMATS = [\n    (\"CRAM\", \"CRAM\"),\n    (\"FASTQ_R1\", \"FASTQ_R1\"),\n    (\"FASTQ_R2\", \"FASTQ_R2\"),\n    (\"FASTQ_I1\", \"FASTQ_I1\"),\n    (\"BAM\", \"BAM\"),\n    (\"PNG\", \"PNG\"),\n    (\"JPEG\", \"JPEG\"),\n    (\"TXT\", \"TXT\"),\n    (\"TSV\", \"TSV\"),\n    (\"CSV\", \"CSV\"),\n    (\"PDF\", \"PDF\"),\n    (\"DICOM\", \"DICOM\"),\n    (\"MD5\", \"MD5\"),\n]\n```\n\nIf you need to support more raw data formats, adding the **EXTRA_RAW_DATA_FORMATS** both in the api and client settings, you can extend the [valid data format choices](https://docs.isabl.io/isabl-settings#extra-choices-settings) in the backend, and provide a new format file validator in the [client settings](https://docs.isabl.io/isabl-settings#isabl-cli-settings) or a new [data importer](https://docs.isabl.io/isabl-settings#isabl-cli-settings).\n\n**ie.** to support `MAF` format:\n\n```\n# In the api settings\nEXTRA_RAW_DATA_FORMATS = [(\"MAF\", \"MAF\")]\n\n# In the cli client settings\nEXTRA_RAW_DATA_FORMATS = [(\"\\\\.maf(\\\\.gz)?$\", \"MAF\")]\n```\n\n**Tip:**subclassing `isabl_cli.data.LocalDataImporter` and overwriting `RAW_DATA_INSPECTORS`might be enough to support new data formats.\n\nIsabl-CLI also supports explicit importing into a single experiment by specifying absolute file paths and metadata in a yaml file via the `import-data-from-yaml` command. The metadata will be added to the `file_data` field in an experiment's `raw_data`.\n\nThe two main parameters to be specified when importing are:\n\n*   **-fi:** an argument that takes a pair of values (field, field value) to identify an experiment. For example, if you had an experiment with a `system_id` of `TEST_EXPERIMENT_T01` , the argument would look like:\n\n`-fi system_id TEST_EXPERIMENT_T01`  \n*   **--files-data:**an argument that takes an absolute file path to the yaml file containing absolute file paths and metadata. For example, if you had a yaml file `/absolute/path/to/files_data.yaml` with the following contents:\n\n```\n/absolute/path/to/file_1.fastq.gz: \n    metadata1: value1 \n    metadata2: value2\n\u200b/absolute/path/to/file_2.fastq.gz: \n    metadata3: value3 \n    metadata4: value4\n``` \nthe argument would look like:\n\n`--files-data /absolute/path/to/files_data.yaml`  \n\nFull command using examples above:\n\n```\nisabl import-data-from-yaml \\\n-fi system_id TEST_EXPERIMENT_T01 \\\n--files-data /absolute/path/to/files_data.yaml \\\n--commit\n```\n\n**View command details by running:**`isabl import-data-from-yaml --help`\n\nYou can link reference data to assemblies and techniques. Here are a few ways of how to go about it.\n\nThe need to register _arbitrary_ resources for any assembly or technique (e.g. gene annotations) is also supported:\n\n```\nisabl import-reference-data --help\n\n# extra resources are included in the assembly directory\nassemblies/\n\u251c\u2500\u2500 GRCh37\n\u2502   \u251c\u2500\u2500 chr_alias\n\u2502   \u2502   \u2514\u2500\u2500 hg19_alias.tab\n\u2502   \u251c\u2500\u2500 cytoband\n\u2502   \u2502   \u2514\u2500\u2500 cytoBand.txt\n\u2502   \u251c\u2500\u2500 genes\n\u2502   \u2502   \u2514\u2500\u2500 refGene.txt\n\u2502   \u2514\u2500\u2500 genome_fasta\n\u2502       \u2514\u2500\u2500 GRCh37.fasta ...\n\u2514\u2500\u2500 GRCm38\n```\n\nIsabl supports the ability to track resources for assemblies and techniques. For instance, ensuring that reference FASTA files are uniformly index, named, and tracked across genome builds:\n\n```\n# indexes are created with `bwa index`, `samtools faidx`, `samtools dict`\nisabl import-reference-genome --help\n\n# example of isabl assemblies directories\nassemblies/\n\u251c\u2500\u2500 GRCh37\n\u2502   \u2514\u2500\u2500 genome_fasta\n\u2502       \u251c\u2500\u2500 GRCh37.fasta\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.amb\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.ann\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.bwt\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.dict\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.fai\n\u2502       \u251c\u2500\u2500 GRCh37.fasta.pac\n\u2502       \u2514\u2500\u2500 GRCh37.fasta.sa\n\u2514\u2500\u2500 ...\n```\n\nLastly, you can register BED files for any _sequencing_ technique, which will be compressed, indexed, moved to the technique data directory, and registered in the database:\n\n```\n# compressed with bgzip, indexed with tabix\nisabl import-bedfiles --help\n\n# example of isabl technique directories\ntechniques/\n\u251c\u2500\u2500 34\n\u2502   \u2514\u2500\u2500 bed_files\n\u2502       \u2514\u2500\u2500 GRCh37\n\u2502           \u251c\u2500\u2500 dna-td-hemepact-v4-grch37.baits.bed\n\u2502           \u251c\u2500\u2500 dna-td-hemepact-v4-grch37.baits.bed.gz\n\u2502           \u251c\u2500\u2500 dna-td-hemepact-v4-grch37.baits.bed.gz.tbi\n\u2502           \u251c\u2500\u2500 dna-td-hemepact-v4-grch37.targets.bed\n\u2502           \u251c\u2500\u2500 dna-td-hemepact-v4-grch37.targets.bed.gz\n\u2502           \u2514\u2500\u2500 dna-td-hemepact-v4-grch37.targets.bed.gz.tbi\n\u2514\u2500\u2500 ...\n```\n\nImported assets are available for systematic processing by Isabl applications.\n\nAll registration mechanisms are configurable and can be customized by providing an alternative python `sub class`:\n\nSetting Name\n\nDefault\n\n**DATA_IMPORTER**\n\nisabl_cli.data.LocalDataImporter\n\n**REFERENCE_GENOME_IMPORTER**\n\nisabl_cli.data.LocalReferenceGenomeImporter\n\n**REFERENCE_DATA_IMPORTER**\n\nisabl_cli.data.LocalReferenceDataImporter\n\n**BED_IMPORTER**\n\nisabl_cli.data.LocalBedImporter\n\nAlthough only local storage is supported at the time of writing, Isabl-CLI capability can be extrapolated to cloud solutions including integration with cloud workbenches such as Arvados.\n\nLast updated 1 year ago\n\nWas this helpful?\n\nThis site uses cookies to deliver its service and to analyze traffic. By browsing this site, you accept the [privacy policy](https://policies.gitbook.com/privacy/cookies).", "source_url": "https://docs.isabl.io/import-data"}, "docs/isabl-settings": {"title": "Configuring Isabl Settings and Managed Options", "summary": "Covers how Isabl components are configured through settings (strings, objects, import strings) and how some settings can be managed from the database admin. It explains import strings, database-managed clients for API/web/CLI settings, and points to where to update default backend and frontend settings in the admin UI.", "tags": ["configuration", "settings", "admin", "isabl-cli"], "content": "# Isabl Settings | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Isabl Settings\n\nEach component of Isabl can be configured in multiple ways. Generally, settings are strings, numbers, objects, and many other types.\n\n`Import Strings`point to an _importable_ object, whether its a class, a function, etc. (e.g.`isabl_cli.data.DataImporter`)\n\n## [](https://docs.isabl.io/isabl-settings#database-managed-settings)\n\nDatabase Managed Settings\n\nSome Isabl API, Isabl Web, and Isabl CLI and be configured from the admin site! To do so, go to `/admin/isabl_api/client/` and update the clients called `default-backend-settings` for Isabl API, and `default-frontend-settings` for Isabl Web. You may want to create your own client for Isabl CLI (see [Writing Applications](https://docs.isabl.io/writing-applications)).\n\n## [](https://docs.isabl.io/isabl-settings#isabl-api-settings)\n\nIsabl API Settings\n\nHere is a detailed list of available configurations for Isabl API. To configure Isabl API, add a dictionary called `ISABL_SETTINGS` to your Django configuration.\n\nSetting Name\n\nType\n\nDescription\n\n**EXTRA_GENDERS**\n\n_List_\n\n`Individual genders` as two-value tuples (value, verbose name).\n\n**EXTRA_STATUS**\n\n_List_\n\n`Analysis status` as two-value tuples (value, verbose name).\n\n**EXTRA_RAW_DATA_FORMATS**\n\n_List_\n\nExperiment `raw_data` formats as two-value tuples (value, verbose name). Learn how to support extra formats [here](https://docs.isabl.io/import-data#supported-data-formats).\n\n**EXTRA_SPECIES**\n\n_List_\n\nIndividual `species` as three-value tuples (value, verbose name, system_id modifier). For example: `[(\"YEAST\", \"YEAST\", \"Y\")]`\n\n**EXTRA_SAMPLE_CATEGORIES**\n\n_List_\n\nSample `categories` as three-value tuples (value, verbose name, system_id modifier). For example`[(\"UNKNOWN\", \"UNKNOWN\", \"U\")]`\n\n**EXTRA_TECHNIQUE_METHODS**\n\n_List_\n\nTechnique `methods`as three-value tuples (value, verbose name, system_id modifier). For example:`[(\"SINGLE-CELL RNA\", \"SINGLE-CELL RNA\", \"scRNA\")]`\n\n**API_V1_EXTRA_PATTERNS**\n\n_Import String_\n\nImport path to a list of [`urlpatterns`](https://docs.djangoproject.com/en/2.2/ref/urls/)to append to API v1.\n\n**SYSTEM_ID_PREFIX**\n\n_String_\n\nA prefix for the default sample ID generated by Isabl (with the hope to differentiate objects across Isabl instances).For example, if set to `DEMO`, then experiments might be named `DEMO_H000002_T01_01_TD01`.\n\n**SYSTEM_ID_GENERATOR**\n\n_Import String_\n\nImport path to a function that takes either an `Individual`, `Sample`, `Aliquot`, or `Experiment` and returns a system identifier. This will overwrite the default generation of system ids (e.g. `DEMO_H000002_T01_01_TD01`).\n\n**FRONTEND_URL**\n\n_String_\n\nURL where the frontend is being deployed (not required if frontend running in same host as backend).\n\n**JIRA_SETTINGS**\n\n_Dictionary_\n\nFeature to integrate JIRA with Isabl projects (It can assign a different JIRA epic to each Isabl Group). [See more](https://docs.isabl.io/isabl-settings#integrating-with-jira).\n\n**REQUIRE_ACCOUNT_APPROVAL**\n\n_Boolean_\n\nDisable new accounts and send out email to admins to require approval before new users can login.\n\n**S3_BASE_STORAGE_DIRECTORIES**\n\n_Dictionary_\n\nSupport loading analyses results from a AWS s3 based \"BASE_STORAGE_DIRECTORY\". Learn more [here](https://docs.isabl.io/isabl-settings#loading-results-from-a-aws-s3-bucket).\n\nLearn more about production deployment:\n\n[Production Deployment](https://docs.isabl.io/production-deployment)\n### [](https://docs.isabl.io/isabl-settings#loading-results-from-a-aws-s3-bucket)\n\nLoading results from a AWS S3 bucket\n\nIf your Isabl CLI [`BASE_STORAGE_DIRECTORY`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)is located in a S3 bucket, you can enable rendering results through the website using the `S3_BASE_STORAGE_DIRECTORIES`setting**:**\n\nFor example if an analysis output path is `/mnt/data/analyses/01/01/1/head_job.log` and and the s3 path to it is `s3://my-bucket/data/analyses/01/01/1/head_job.log` you should use this setting:\n\nif `prefer_original` is set to `True` (`False` by default), it will try to retrieve the original path first if exists (i.e. `/mnt/data/analyses/01/01/1/head_job.log`) , if not it will try to resolve for the file in S3 (i.e. `s3://my-bucket/data/analyses/01/01/1/head_job.log`)\n\n### [](https://docs.isabl.io/isabl-settings#integrating-with-jira)\n\nIntegrating with Jira\n\nIsabl provides a simple integration to [Jira](https://www.atlassian.com/software/jira/guides/use-cases/what-is-jira-used-for), as it's a widely used management tool used for development and analyses. The module creates a _Jira Epic_ for each Isabl project, and allows to create a simple list of tasks (_Jira issues_) from the web.\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-MRgUOKPcrLb3uJ2_dgb%252F-MRgh89mUx9bNFgMO_sN%252FJira2.gif%3Falt%3Dmedia%26token%3Da93f1c0d-18ac-49ce-af3a-f60b14d66af7&width=768&dpr=3&quality=100&sign=344f16ad&sv=2)\n\nJira Integration Demo\n\nTo enable, you need to add the following settings in the web and in the api.\n\n**In the Web Settings:**\n\n**In the Api Settings:**\n\nIn Jira for Epic and Issues we can [create custom fields](https://confluence.atlassian.com/adminjiraserver/adding-a-custom-field-938847222.html). You need to create 2 custom fields where the Project ID and the Project Link will be stored, and use their ids in the settings.\n\n_**Pro Tip:**_ _Jira Epics_ are created under _Jira Projects. Y_ ou can create different Jira Projects for each Isabl Project Group, by adding extra dictionaries that map to isabl group acronyms.\n\ni.e. If a group in Isabl is called (name: Pathology, acronym: PATH), you can set up your settings like the example below. And all Isabl Projects that belong to the PATHOLOGY group, will have their own separate Jira Project under `https://my-jira-instance/projects/PATH/issues/`\n\n## [](https://docs.isabl.io/isabl-settings#isabl-cli-settings)\n\nIsabl CLI Settings\n\nBefore anything, you must set the following environment variables:\n\nOnce this is set, you can configure your client object settings with the following configurations (see [`isabl_cli.settings`](https://github.com/isabl-io/cli/blob/master/isabl_cli/settings.py#L20) to check default settings):\n\nSetting Name\n\nType\n\nDescription\n\n**API_BASE_URL**\n\n_String_\n\nurl host where your isabl api is running. Needed to connect the CLI with the API.\n\n**BASE_STORAGE_DIRECTORY**\n\n_String_\n\nDirectory where data will be store in the file system.\n\n**TIME_ZONE**\n\n_String_\n\nCurrent timezone used by `pytz` package.\n\n**INSTALLED_APPLICATIONS**\n\n_Import Strings Array_\n\nArray of registered applications to be run with the cli tool. These apps can be seen and run `isabl apps --help`.\n\n**CUSTOM_COMMANDS**\n\n_Import Strings Array_\n\nArray of custom commands to be added to the custom cli tool.\n\n**SYSTEM_COMMANDS**\n\n_Import Strings Array_\n\nArray of system commands that are used in isabl-cli.\n\n**ADMIN_COMMANDS**\n\n_Import Strings Array_\n\nArray of commands that are only executable by admin.\n\n**ADMIN_USER**\n\n_String_\n\nLinux user for which admin operations will be limited. This user will own the data and analyses results. Nevertheless, Isabl Applications can be run by multiple unix users. Learn more about it [here](https://docs.isabl.io/writing-applications#applications-run-by-multiple-users).\n\n**CREATE_SYMLINKS**\n\n_Boolean_\n\nBy default, Isabl creates a [symlink farm](https://docs.isabl.io/data-model) upon data import and analyses completion. You can turn it off with this setting.\n\n**DEFAULT_LINUX_GROUP**\n\n_String_\n\nLinux group for data admin_user to use.\n\n**MAKE_STORAGE_DIRECTORY**\n\n_Import String_\n\nGet and create path to a data directory.\n\n**TRASH_ANALYSIS_STORAGE**\n\n_Import String_\n\nMove analysis `storage_url` to a trash directory.\n\n**REFERENCE_DATA_IMPORTER**\n\n_Import String_\n\nRegister input_bed_path in technique's storage dir and update data.\n\n**DATA_IMPORTER**\n\n_Import String_\n\nImport raw data for multiple experiments.\n\n**BED_IMPORTER**\n\n_Import String_\n\nRegister input_bed_path in technique's storage dir and update data.\n\n**ON_DATA_IMPORT**\n\n_Import Strings Array_\n\nMethods triggered when data has been imported successfully.\n\n**ON_STATUS_CHANGE**\n\n_Import Strings Array_\n\nMethods triggered when an analysis changes status.\n\n**ON_SIGNAL_FAILURE**\n\n_Import Strings Array_\n\nMethods triggered when an signal fails.\n\n**SUBMIT_ANALYSES**\n\n_Import String_\n\nA function that will take a list tuples (analysis, path to analysis script) and submits them to a given compute architecture.\n\n**SUBMIT_CONFIGURATION**\n\nDictionary\n\nA schema-less dictionary to set configurations that the `SUBMIT_ANALYSES`function may utilize. See more Batch Systems.\n\n**EXTRA_RAW_DATA_FORMATS**\n\nTuples Array\n\nFor every new supported format a tuple of `(regex validator, file_data_type)` i.e. To support Illumina ORA format: `[\"\\\\.ora?$\", \"ORA\"]`\n\n[Writing Applications](https://docs.isabl.io/writing-applications)\n#### [](https://docs.isabl.io/isabl-settings#submit-configuration)\n\nSubmit Configuration\n\n## [](https://docs.isabl.io/isabl-settings#isabl-web-settings)\n\nIsabl Web Settings\n\nCustomization of the User Interface can be achieved by defining a global `$isabl` settings dictionary in the main `index.html`.\n\nYou can configure the `window.$isabl` with the following parameters:\n\nSetting Name\n\nType\n\nDefault\n\nDescription\n\n`apiHost`\n\n`String`\n\n`''`\n\nUrl host where your `isabl api` is running.\n\n`name`\n\n`String`\n\n`'isabl'`\n\nCustom app title that is shown in the top of the app.\n\n`logo`\n\n`String`\n\nCustom image path that is shown as the main logo of the app. Use a square size image for better display.\n\n`jira`\n\n`Boolean`\n\n`false`\n\nActivate the jira card in the projects view. If the jira endpoint is available from the api, it will show the current tickets for each project. Learn more about [jira integration](https://developer.atlassian.com/server/jira/platform/rest-apis/).\n\n`oncoTree`\n\n`Boolean`\n\n`false`\n\nIf it's enabled, more information about the [onco tree](http://oncotree.mskcc.org/#/home)disease is added in the _Sample details_.\n\n`customFields`\n\n`Object`\n\n`{}`\n\nEvery detail info for each model shown in the frontend can be customized, by overwriting the specific key of a fields object. Available fields can be seen [here](https://github.com/isabl-io/web/blob/master/src/utils/fields.js). Learn more on how to create custom fields (**TODO**).\n\n`restartButton`\n\n`Boolean`\n\n`false`\n\nIf enabled,`FAILED` analyses can send a signal to restart or force to the database. Learn more in[signals](https://docs.isabl.io/operational-automations).\n\n`lightTheme`\n\n`Object`\n\nSee [defaults](https://github.com/isabl-io/web/blob/master/src/utils/settings.js#L8)\n\nColors to customize the light theme.\n\n`darkTheme`\n\n`Object`\n\nSee [defaults](https://github.com/isabl-io/web/blob/master/src/utils/settings.js#L20)\n\nColors to customize the dark theme.\n\n`modelIcons`\n\n`Object`\n\n`{}`\n\n[Material Icon](https://material.io/resources/icons/?style=baseline) names to customize panel icons.\n\n`distinctRecords`\n\n`Boolean`\n\n`false`\n\nBy default, api queries don't remove duplicates as it impacts speed. Set `true` to avoid duplicate records.\n\n`treeIcons`\n\n`Object`\n\n`{}`\n\nPlease use these if the graph icons are broken:\n\n### [](https://docs.isabl.io/isabl-settings#example-of-a-custom-ui-configuration)\n\nExample of a custom UI configuration\n\n**Important:** In case you're running your frontend instance in a different host that the backend, you should add this `ENV` variable to your django project where the `isabl-api` is running:\n\nIf you want to consume `isabl-web` and serve your own html, outside of `isabl-api`. You can consume the frontend just as:\n\n[Previous Project Privacy](https://docs.isabl.io/project-privacy)[Next Production Deployment](https://docs.isabl.io/production-deployment)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Database Managed Settings](https://docs.isabl.io/isabl-settings#database-managed-settings)\n*   [Isabl API Settings](https://docs.isabl.io/isabl-settings#isabl-api-settings)\n*   [Loading results from a AWS S3 bucket](https://docs.isabl.io/isabl-settings#loading-results-from-a-aws-s3-bucket)\n*   [Integrating with Jira](https://docs.isabl.io/isabl-settings#integrating-with-jira)\n*   [Isabl CLI Settings](https://docs.isabl.io/isabl-settings#isabl-cli-settings)\n*   [Isabl Web Settings](https://docs.isabl.io/isabl-settings#isabl-web-settings)\n*   [Example of a custom UI configuration](https://docs.isabl.io/isabl-settings#example-of-a-custom-ui-configuration)\n\nWas this helpful?\n\nCopy\n```\n\"S3_BASE_STORAGE_DIRECTORIES\": {\n    \"/base/path/in/output-file\": {\n        \"bucket\": \"an-S3-bucket-name\",\n        \"access_key\": \"The AWS Access Key\",\n        \"access_key\": \"The AWS Access Key\",\n        \"base_directory\": \"/base/path/in/s3/object\",\n        \"prefer_original\": false\n    }\n}\n```\n\nCopy\n```\n\"S3_BASE_STORAGE_DIRECTORIES\": {\n    \"/mnt/data/\": {\n        \"bucket\": \"my-bucket\",\n        \"base_directory\": \"/data/\",\n        ...\n    }\n}\n```\n\nindex.html\n\nCopy\n```\nwindow.$isabl = {\n    ...\n    jira: true\n}\n```\n\nCopy\n```\n\"JIRA_SETTINGS\": {\n    \"active\": True,\n    \"default\": {\n        \"URL\": \"https://my-jira-instance\",\n        \"AUTH\": (\"jira-username\", \"secret-jira-password\"),\n        \"PROJECT_KEY\": \"ISABL\",\n        \"URL_FIELD\": \"customfield_id_1\",\n        \"PROJECT_FIELD\": \"customfield_id_2\",\n    }\n},\n```\n\nCopy\n```\n\"JIRA_SETTINGS\": {\n    \"active\": True,\n    \"default\": {\n        \"URL\": \"https://my-jira-instance\",\n        \"AUTH\": (\"jira-username\", \"secret-jira-password\"),\n        \"PROJECT_KEY\": \"ISABL\",\n        \"URL_FIELD\": \"customfield_id_1\",\n        \"PROJECT_FIELD\": \"customfield_id_2\",\n    },\n    \"PATH\": {\n        \"URL\": \"https://my-jira-instance\",\n        \"AUTH\": (\"jira-username\", \"secret-jira-password\"),\n        \"PROJECT_KEY\": \"PATH\",\n        \"URL_FIELD\": \"customfield_id_1\",\n        \"PROJECT_FIELD\": \"customfield_id_2\",\n    }\n},\n```\n\nCopy\n```\n# you need to let Isabl CLI where the API is being hosted\nexport ISABL_API_URL='your-isabl-instance.org/api/v1/'\n\n# you can create a client object in from the django admin\nexport ISABL_CLIENT_ID=<insert-client-primary-key-or-slug>\n```\n\nCopy\n```\n<script>\n    window.$isabl = { }\n<\/script>\n```\n\nCopy\n```\n\"treeIcons\": {\n    \"male\": \"https://isabl-web.s3.us-east-1.amazonaws.com/male.svg\",\n    \"female\": \"https://isabl-web.s3.us-east-1.amazonaws.com/female.svg\",\n    \"normal\": \"https://isabl-web.s3.us-east-1.amazonaws.com/normal.svg\",\n    \"tumor\": \"https://isabl-web.s3.us-east-1.amazonaws.com/tumor.png\",\n    \"aliquot\": \"https://isabl-web.s3.us-east-1.amazonaws.com/normal.svg\",\n    \"dna\": \"https://isabl-web.s3.us-east-1.amazonaws.com/dna.svg\",\n    \"rna\": \"https://isabl-web.s3.us-east-1.amazonaws.com/rna.svg\",\n    \"mouse\": \"https://isabl-web.s3.us-east-1.amazonaws.com/mouse.svg\",\n    \"image\": \"https://isabl-web.s3.us-east-1.amazonaws.com/image.svg\",\n    \"alien\": \"https://isabl-web.s3.us-east-1.amazonaws.com/unknown.svg\",\n  }\n```\n\nCopy\n```\n<script>\n    const customFields = {\n        // overwrite 2 of the fields of the analysis panel\n        analysisFields: {\n            // Add a new formatter for status\n            status: {\n                section: 'Analysis Details',\n                verboseName: 'Status',\n                field: 'status',\n                formatter: value => {\n                    if (value === 'SUCEEDED') {\n                        return 'DONE!'\n                    } else if (value === 'FAILED') {\n                        return 'OOPS...'\n                    } else {\n                        return value\n                    }\n                }\n            },\n            // Make notes not editable\n            notes: {\n                section: 'Analysis Details',\n                verboseName: 'Notes',\n                field: 'notes',\n                editable: false\n            }\n        },\n        // display a new custom field for project that exist in the db.\n        // Use http://<api-host>/admin/ to create custom fields.\n        projectFields: {\n            // custom field\n            irbConstent: {\n              section: 'Project Details',\n              verboseName: 'IRB Consent',\n              field: 'custom_fields.irb_consent',\n              editable: true,\n              apiPermission: 'change_project'\n            }\n          }\n        }\n    }\n\n    window.$isabl = {\n        apiHost: \"http://my.isabl.api.host\",\n        name: \"My Cool App\",\n        logo: \"/path/to/my/awesome/logo\",\n        customFields,\n        restartButton: true,\n        jira: true,\n        oncoTree: true,\n        darkTheme: {\n          primary: '#1dc5a7',\n          background: '#1a202c',\n          surface: '#3a4556',\n          accent: '#4a5568'\n        },\n        modelIcons: {\n          project: 'insert_chart',\n          analysis: 'bubble_chart',\n          individual: 'person',\n          sample: 'gesture',\n          experiment: 'flash_on',\n          search: 'search',\n          submission: 'assignment'\n        },\n    }\n<\/script>\n```\n\nCopy`export FRONTEND_URL=\"http://your-frontend-host.com\"`\n\nindex.html\n\nCopy\n```\n<!DOCTYPE html>\n<html>\n    <head>\n        <meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge,chrome=1\">\n        <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n        <meta charset=\"UTF-8\">\n        <link href='https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons' rel=\"stylesheet\" type=\"text/css\">\n        <link rel=\"icon\" href=\"favicon.ico\">\n        <title>My Awesome App<\/title>\n    <\/head>\n    <body>\n\n <div id=\"isabl-web\"><\/div>\n        <script src=\"https://cdn.jsdelivr.net/npm/vue\"><\/script>\n        <script src=\"https://cdn.jsdelivr.net/npm/isabl-web\"><\/script>\n        <script>\n            window.$isabl = {\n                apiHost: \"http://my.isabl.api.host\",\n                //... other settings\n            }\n        <\/script>\n    <\/body>\n<\/html>\n```", "source_url": "https://docs.isabl.io/isabl-settings"}, "docs/maintenance": {"title": "Maintenance: Backups and Best Practices", "summary": "Lists utilities and recommended practices to keep an Isabl instance healthy and data safe, with an emphasis on Postgres backups. The guide shows docker-compose commands to create, list, and restore database backups and points to maintenance-related files included in the cookiecutter-api project.", "tags": ["maintenance", "backups", "postgres", "docker"], "content": "# Maintenance | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Maintenance\n\n\ud83e\uddfc Some utilities and good practices to keep your isabl instance data safe\n\n## [](https://docs.isabl.io/maintenance#database-backups)\n\nDatabase backups\n\nThe [cookiecutter-api](https://github.com/papaemmelab/cookiecutter-api) comes with some handy utilities to manage postgres backups, that you can inspect in your project code directory (`compose/production/postgres/maintenance`):\n\n**1. To create a backup:**\n\nCopy`docker-compose -f <environment>.yml (exec |run --rm) postgres backup`\n\n**2. To list/view current backups:**\n\nCopy`docker-compose -f <environment>.yml (exec |run --rm) postgres backups`\n\n**3. To restore a backup:**\n\nCopy`docker-compose -f <environment>.yml (exec |run --rm) postgres restore`\n\nIt's a good practice to run your `backup` script regularly. For example, adding it to a cron job that runs periodically (i.e. every month, or every week)\n\n## [](https://docs.isabl.io/maintenance#backup-to-amazon-s3)\n\nBackup to Amazon S3\n\nAfter this [commit](https://github.com/papaemmelab/cookiecutter-api/commit/c379dab5344491bceaebaa74257352edaec83f70) in `cookiecutter-api`, you can store backups in the cloud in Amazon S3. You need to add these 3 environment variables in your `.envs/.production/.django` file:\n\nCopy\n```\nexport DJANGO_AWS_ACCESS_KEY_ID=\nexport DJANGO_AWS_SECRET_ACCESS_KEY=\nexport DJANGO_AWS_STORAGE_BUCKET_NAME=\n```\n\n**4. Upload recursively all the database backups to your AWS S3 bucket**\n\nCopy`docker-compose -f production.yml run --rm awscli upload`\n\n**5. Download a specific backup to your instance docker volume**\n\nLearn more at [cookicutter-django docs](https://docs.isabl.io/maintenance#backup-to-amazon-s3).\n\n[Previous Production Deployment](https://docs.isabl.io/production-deployment)[Next Batch Systems](https://docs.isabl.io/batch-systems)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Database backups](https://docs.isabl.io/maintenance#database-backups)\n*   [Backup to Amazon S3](https://docs.isabl.io/maintenance#backup-to-amazon-s3)\n\nWas this helpful?\n\nCopy`docker-compose -f production.yml run --rm awscli download backup_2018_03_13T09_05_07.sql.gz`", "source_url": "https://docs.isabl.io/maintenance"}, "docs/operational-automations": {"title": "Automating Workflows with Signals and Triggers", "summary": "Explains Isabl's signals system for automating actions when experiments are imported or analyses change status. It shows how to register signal functions via ON_DATA_IMPORT and ON_STATUS_CHANGE settings, gives code examples for common automations (alignment, QC, downstream apps), and documents manual triggering with the CLI.", "tags": ["automation", "signals", "workflows", "cli"], "content": "\u2318Ctrl k\n\n## Operational Automations\n\n\ud83e\udd16 Once you have set up your Isabl instance and created a few applications you can now automate your processes! In Isabl, this is achieved using signals.\n\nSignals are python functions that take _one_ argument: an **experiment** or an **analysis**. Signals for experiments are triggered on data import, whilst signals for analyses are triggered on status change (i.e. analysis failure or completion).\n\nRegister signals by including the function import string in either [`ON_STATUS_CHANGE`](https://docs.isabl.io/isabl-settings#isabl-cli-settings) or [`ON_DATA_IMPORT`](https://docs.isabl.io/isabl-settings#isabl-cli-settings) Isabl CLI settings:\n\n```\n# experiments signals are triggered on data import\n\"ON_DATA_IMPORT\": [\n    \"my_apps.signals.trigger_apps\"\n]\n\n# analyses signals are triggered on status change\n\"ON_STATUS_CHANGE\": [\n    \"my_apps.signals.trigger_dependencies\"\n]\n```\n\nSignals for experiments are triggered on data import and receive the experiment object as its only argument. You can use the metadata of the experiment to determine what automation should be applied.\n\n```\nfrom isabl_apps import apps\n\ndef signal_data_import(experiment):\n    \"\"\"Run upon data import using the cli.\"\"\"\n    species = experiment.sample.individual.species\n    category = experiment.technique.category\n    dna_aligner = {\"HUMAN\": apps.BwaMemGRCh37, \"MOUSE\": apps.BwaMemGRCm38}.get(species)\n    tuples = [([experiment], [])]\n\n    if category == \"DNA\" and dna_aligner:\n        dna_aligner().run(tuples=tuples, commit=True)\n```\n\nSome examples are:\n\n*   Trigger assembly/species/category aware alignment \n*   Perform Gene quantification or Fusion calling in RNA \n*   Create symlinks to the raw data that are more human accessible \n\nAnalyses signals are triggered on status change. Each signal will receive the analysis object as its only argument. You can use the metadata of the experiment to determine what automation should be applied.\n\n```\nfrom isabl_apps import apps\n\ndef signal_apps_automation(analysis):\n    \"\"\"Run upon an analysis status update in the database.\"\"\"\n    qc_app = {\n        \"GRCh37\": apps.QualityControlGRCh37,\n        \"GRCm38\": apps.QualityControlGRCm38,\n    }.get(analysis.application.assembly.name)\n\n    if (\n        analysis.status == \"SUCCEEDED\"\n        and analysis.application.name in [\"DISAMBIGUATE\", \"BWA_MEM\", \"STAR\"]\n        and qc_app\n    ):\n        qc_app().run(tuples=[(analysis.targets, [])], commit=True)\n```\n\nSome examples are:\n\n*   Trigger Quality Control/Coverage calculation after alignment has successfully been run \n*   Trigger Variant Calling after alignment \n*   Trigger Report Generation after analyses have been completed \n\nHere are a few examples of how to work with signals, trigger them, and get notified if signals fail.\n\nYou can trigger signals manually with Isabl CLI:\n\n```\n# experiment signals\nisabl run-signals experiments -s my_apps.signals.trigger_apps -fi projects 100 \n\n# analyses signals\nisabl run-signals analyses -s my_apps.signals.trigger_dependencies -fi projects 100\n```\n\nWhen signals fail during automation, database records are created to keep track of this event. Rerun failed signals with:\n\n```\n# rerun all failed signals\nisabl rerun-signals\n\n# rerun failed signals using filters\nisabl rerun-signals \\\n    -fi import_string my_apps.signals.trigger_apps \\\n    -fi target_endpoint analyses \\\n    -fi target_id <an analysis primary key>\n```\n\nYou can configure Isabl API to periodically check if any signal has failed and send you email notifications. To do so, head to the admin site at `/admin/django_celery_beat/periodictask/add/` and in _Task (registered)_ select `isabl_api.tasks.report_failed_signals_task`, then create a 15 minutes interval, and hit save:\n\nLast updated 2 years ago\n\nWas this helpful?\n\nThis site uses cookies to deliver its service and to analyze traffic. By browsing this site, you accept the [privacy policy](https://policies.gitbook.com/privacy/cookies).", "source_url": "https://docs.isabl.io/operational-automations"}, "docs/other-cli-commands": {"title": "Isabl CLI: Commands, Retrieval, and Management", "summary": "Summarizes the major capabilities of the isabl-cli package, including creating/executing analyses, retrieving data, and importing/managing files. The page highlights that the CLI exposes many useful functions for common workflows and points users to specific command areas for analyses, data retrieval, and imports.", "tags": ["cli", "commands", "data-retrieval", "analyses"], "content": "# Other CLI commands | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Other CLI commands\n\n\u2604\ufe0fIsabl comes with a bunch of built-in commands to run from the terminal.\n\n## [](https://docs.isabl.io/other-cli-commands#getting-super-powers)\n\nGetting Super Powers\n\nThe python package of `isabl-cli` comes with a lot of useful functions that allows you to achieve mainly 3 type of needs:\n\n1.     Create and Execute analyses ([See Running Applications](https://docs.isabl.io/writing-applications#running-applications)) \n2.     Retrieve information ([See Retrieving Data](https://docs.isabl.io/retrieve-data#isabl-command-line-client)) \n3.     and, Import and manage files into your workspace (See [Importing Data](https://docs.isabl.io/import-data#data-import)) \n\nCopy\n```\n$ isabl --help\n\nUsage: isabl [OPTIONS] COMMAND [ARGS]...\n\n  Run Isabl command line tools.\n\nOptions:\n  --version  Show the version and exit.\n  --help     Show this message and exit.\n\nCommands:\n  apps-grch37                GRCh37 applications.\n  apps-grcm38                GRCm38 applications.\n  get-bams                   Get storage directories, use `pattern` to\n                             match...\n  get-bed                    Get a BED file for a given Sequencing...\n  get-count                  Get count of database instances.\n  get-data                   Get file paths for experiments raw data.\n  get-metadata               Retrieve metadata for multiple instances.\n  get-outdirs                Get analyses outdirs, use `pattern` to match...\n  get-paths                  Get storage directories, use `pattern` to\n                             match...\n  get-reference              Retrieve reference data from assemblies...\n  get-results                Get analyses results.\n  import-bedfiles            Register targets and baits BED files in a...\n  import-data                Find and import experiments data from many...\n  import-reference-data      Register reference data for assemblies...\n  import-reference-genome    Register an assembly reference genome.\n  login                      Login with isabl credentials.\n  merge-individual-analyses  Merge analyses by individual.\n  merge-project-analyses     Merge analyses by project.\n  patch-results              Update the results field of many analyses.\n  process-finished           Process and update finished analyses.\n  rerun-signals              Rerun failed signals.\n  run-failed-analyses        Command to run failed analyses in batch.\n  run-signals                Run any arbitrary signal on analyses or...\n  run-web-signals            Run signals triggered from the frontend.\n```\n\nSome of these commands are only available for the **admin** user, like:\n\n*     To manage files and data ([See Importing Data](https://docs.isabl.io/import-data)):`import-data, import-bedfiles, import-reference-data, import-reference-genome` \n*     To change permissions of finished analyses: `process-finished` \n*     To update the linked results of completed analyses: `patch-results` \n\n### [](https://docs.isabl.io/other-cli-commands#create-your-custom-cli-commands)\n\nCreate your custom CLI Commands\n\nYou can customize your available commands, by extending the `isabl-cli`. The following are examples of cases where you want to create commands that execute more than one app at the same time, or create a method for a common metadata query:\n\nThen you can add the commands to your CLI Settings ([Learn how to customize your cli](https://docs.isabl.io/isabl-settings#isabl-cli-settings)):\n\nNow your custom commands will be available:\n\n[Previous Contributing Guide](https://docs.isabl.io/contributing-guide)[Next Bonus tips](https://docs.isabl.io/bonus-tips)\n\nLast updated 6 years ago\n\nWas this helpful?\n\n*   [Getting Super Powers](https://docs.isabl.io/other-cli-commands#getting-super-powers)\n*   [Create your custom CLI Commands](https://docs.isabl.io/other-cli-commands#create-your-custom-cli-commands)\n\nWas this helpful?\n\nmy_commands/cli.py\n\nCopy\n```\nimport datetime\nimport click\nfrom isabl_cli import options\nfrom isabl_cli import commands\nfrom my_apps import apps\n\n@click.command()\n@options.PAIRS\n@options.PAIRS_FROM_FILE\n@options.SKIP\n@options.COMMIT\n@options.FORCE\n@options.RESTART\n@options.QUIET\ndef triple_caller(commit, force, quiet, restart, skip, pairs, pairs_from_file):\n    \"\"\"\n    Command to run THE 3-CALLER pipeline.\n    \"\"\"\n    for pipe in [\n        apps.CallerOneGRCh37,\n        apps.CallerTwoGRCh37,\n        apps.CallerThreeGRCh37,\n    ]:\n        pipe().run(\n            tuples=pairs + pairs_from_file,\n            commit=commit,\n            force=force,\n            restart=restart,\n            verbose=not quiet,\n            run_args=dict(skip=skip),\n        )\n        \n\n@click.command()\n@click.pass_context\ndef get_succeded_kids_analyses(ctx):\n    \"\"\"\n    Command to print information from all Succeded Analyses executed on\n    Pediatric Children (age <= 18) of MSK Kids.\n    \"\"\"\n    current_year = datetime.datetime.now().year\n    filters = dict(\n        status=\"SUCCEEDED\",\n        targets__center__name=\"MSK Kids\",\n        targets__sample__individual__birth_year__gte=(current_year - 18),\n    )\n    fields = [\n        \"targets__sample__individual__system_id\",\n        \"pk\",\n        \"status\",\n        \"application__name\",\n        \"application__version\",\n    ]\n    ctx.invoke(\n        commands.get_metadata,\n        identifiers=None,\n        endpoint=\"analyses\",\n        field=[i.split(\"__\") for i in fields],\n        filters=filters,\n        no_headers=False,\n        json_=False,\n        use_fx=False,\n    )\n```\n\nCopy\n```\nCUSTOM_COMMANDS = [\n    my_commands.cli.triple_caller,\n    my_commands.cli.get_succeded_kids_analyses\n]\n```\n\nCopy\n```\n$ isabl --help\n\nUsage: isabl [OPTIONS] COMMAND [ARGS]...\n\n  Run Isabl command line tools.\n\nOptions:\n  --version  Show the version and exit.\n  --help     Show this message and exit.\n\nCommands:\n  \n  ...\n  \n  triple_caller                Command to run THE 3-CALLER pipeline.\n  get-succeded-kids-analyses   Command to print metadata of all Succeded...\n```", "source_url": "https://docs.isabl.io/other-cli-commands"}, "docs/production-deployment": {"title": "Production Deployment: Installing Isabl API and CLI", "summary": "Provides guidance for deploying Isabl components in production: installing isabl-api on premise as a Django app and installing isabl-cli in your production environment. It documents installation methods for the CLI (pip from GitHub or editable install) and references deployment-related considerations and files used in production setups.", "tags": ["deployment", "production", "installation", "isabl-api"], "content": "# Production Deployment | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Production Deployment\n\n## [](https://docs.isabl.io/production-deployment#isabl-api-in-production)\n\nIsabl API in Production\n\n[Install `isabl-api` on premise](https://docs.isabl.io/production-deployment#isabl-api-on-premise) as a third party application in a Django project.\n\n## [](https://docs.isabl.io/production-deployment#isabl-cli-in-production)\n\nIsabl CLI in Production\n\nIn your production environment you can install [Isabl CLI](https://github.com/papaemmelab/isabl_cli) with:\n\nCopy\n```\n# install isabl-cli from Github\npip install git+https://github.com/papaemmelab/isabl_cli#eggs=isabl-cli\n\n# or clone locally and install as editable\ngit clone https://github.com/papaemmelab/isabl_cli <your-dir>/isabl_cli\npip install -e <your-dir>/isabl_cli\n```\n\nCopy\n```\n# let the client know what API should be used\nexport ISABL_API_URL=\"https://isabl.mskcc.org/api/v1/\"\n\n# set client id, you can create a new client in the admin site\nexport ISABL_CLIENT_ID=\"<replace with client primary key>\"\n\n# isabl should be now available\nisabl --help\n```\n\nFor example, if `ISABL_CLIENT_ID=1` you can update the settings field at [https://my.isabl/admin/isabl_api/client/1/change/](https://isabl.mskcc.org/admin/isabl_api/client/1/change/). An example of such configuration could be:\n\nThis is how the admin website looks like for editing Isabl CLI settings:\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-Lswtn02-oPqAA46DtKY%252F-Lsx30RcC9wLXYUyzGdz%252Fimage.png%3Falt%3Dmedia%26token%3Da2c12fcb-9d68-460f-9ea7-01aff4a74ec1&width=768&dpr=3&quality=100&sign=81e3b056&sv=2)\n\nEditing Isabl CLI settings from the Admin.\n\n### [](https://docs.isabl.io/production-deployment#multiuser-setup)\n\nMultiuser Setup\n\nIsabl CLI can be used by multiple users. By default, any user can import data and result files are owned by whoever triggered the application. These capabilities can be limited to an [`ADMIN_USER`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)**.**In this setup, data and results are owned by the`ADMIN_USER`yet [applications can be triggered by any user](https://docs.isabl.io/writing-applications#applications-run-by-multiple-users).\n\nAn[`ADMIN_USER`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)is a shared unix account that can be accessed by one or more engineers. These engineers are responsible for the data and results of Isabl installations.\n\nFirst you need to assign the right API permissions to your users. To facilitate this Isabl comes with the following command:\n\nThis command will create the following three Django groups:\n\nGroup name\n\nDescription\n\nPermissions to\n\n**Managers**\n\nIndividuals who register samples.\n\nCustomField, Individual, Center, Disease, Experiment, Technique, Platform, Project, Submission, Analysis\n\n**Analysts**\n\nindividuals who run analyses.\n\nCustomField, Application, Analysis, Assembly\n\n**Engineers**\n\nA combination of Managers and Analysts\n\nCustomField, Individual, Center, Disease, Experiment, Technique, Platform, Project, Submission, Analysis, Application, Assembly\n\nThen you will need to configure the `ADMIN_USER` and the `DEFAULT_LINUX_GROUP` in the Isabl CLI _client object_ (you can do so by updating your client `ISABL_CLIENT_ID` from the Django admin website). For example:\n\nOnce you follow the [writing applications guide](https://docs.isabl.io/writing-applications), you will understand that Isabl Applications can be managed using a python package. If you have multiple users triggering applications, you may want to have them all pointing to the same package. This can be either using the `PYTHONPATH` environment variable or pip installing locally your apps repo:\n\nLearn more about [Writing Applications](https://docs.isabl.io/writing-applications):\n\n[Writing Applications](https://docs.isabl.io/writing-applications)\nLearn more about [Isabl CLI settings](https://docs.isabl.io/isabl-settings#isabl-cli-settings):\n\n[Isabl Settings](https://docs.isabl.io/isabl-settings)\nLearn more about [Retrieving Data](https://docs.isabl.io/retrieve-data) using `isabl-cli` to fetch data:\n\n[Retrieving Data](https://docs.isabl.io/retrieve-data)\n\n**Pro tip:**use the `Can Download Results` permission to configure what users can download analyses results in your Isabl instance.\n\n### [](https://docs.isabl.io/production-deployment#initialize-data-lake)\n\nInitialize Data Lake\n\nWith the admin user run the following snippet in the [`BASE_STORAGE_URL`](https://docs.isabl.io/isabl-settings#isabl-cli-settings):\n\n## [](https://docs.isabl.io/production-deployment#isabl-api-on-premise)\n\nIsabl API on Premise\n\nYou can bootstrap a new Django project using [Cookiecutter API](https://github.com/isabl-io/cookiecutter):\n\n#### [](https://docs.isabl.io/production-deployment#cookiecutter-api-features)\n\nCookiecutter API Features\n\n*     [Isabl](https://isabl-io.github.io/docs/#/) out of the box \n*     For Django 2.0 & Python 3.6 \n*     Renders a Django project with 100% starting test coverage \n*     [12-Factor](http://12factor.net/) based settings via [django-environ](https://github.com/joke2k/django-environ) \n*     Secure by default with SSL. \n*     Optimized development and production settings \n*     Registration via [django-allauth](https://github.com/pennersr/django-allauth) \n*     Send emails via [Anymail](https://github.com/anymail/django-anymail) (using [Mailgun](http://www.mailgun.com/) by default, but switchable) \n*     Media storage using Amazon S3 \n*     [Docker-compose](https://github.com/docker/compose) for development and production (using [Caddy](https://caddyserver.com/) with [LetsEncrypt](https://letsencrypt.org/) support) \n*     [Procfile](https://devcenter.heroku.com/articles/procfile) for deploying to Heroku \n*     Run tests with `py.test` \n*     Customizable PostgreSQL version \n*     [Celery](http://www.celeryproject.org/) with [Flower](https://github.com/mher/flower) \n*     **optional** - Serve static files from Amazon S3 or [Whitenoise](https://whitenoise.readthedocs.io/) \n*     **optional** - Integration with [MailHog](https://github.com/mailhog/MailHog) for local email testing \n\n#### [](https://docs.isabl.io/production-deployment#cookiecutter-api-constraints)\n\nCookiecutter API Constraints\n\n*     Only maintained 3rd party libraries are used. \n*     Uses PostgreSQL everywhere (9.2+) \n*     Environment variables for configuration (This won't work with Apache/mod_wsgi except on AWS ELB). \n\n[Isabl Cookiecutter](https://github.com/isabl-io/cookiecutter) is a proud fork of [cookiecutter-django](https://github.com/pydanny/cookiecutter-django), please note that most of their [documentation](https://cookiecutter-django.readthedocs.io/en/latest/) remains relevant! Also see [troubleshooting](https://cookiecutter-django.readthedocs.io/en/latest/troubleshooting.html). For reference, we forked out at commit [4258ba9](https://github.com/pydanny/cookiecutter-django/commit/4258ba9e2ddc822953e326f98f1f74842fa0fed1). If you have differences in your preferred setup, please fork [Isabl Cookiecutter](https://github.com/isabl-io/cookiecutter) to create your own version. **New to Django?**[Two Scoops of Django](http://twoscoopspress.com/products/two-scoops-of-django-1-11) is the best dessert-themed Django reference in the universe!\n\n### [](https://docs.isabl.io/production-deployment#understanding-the-docker-compose-setup)\n\nUnderstanding the Docker Compose Setup\n\nBefore you begin, check out the `production.yml` file in the root of this project. Keep note of how it provides configuration for the following services:\n\n*     `django`: your application running behind `Gunicorn`; \n*     `postgres`: PostgreSQL database with the application's relational data; \n*     `redis`: Redis instance for caching; \n*     `caddy`: Caddy web server with HTTPS on by default. \n\nProvided you have opted for Celery (via setting `use_celery` to `y`) there are three more services:\n\n*     `celeryworker` running a Celery worker process; \n*     `celerybeat` running a Celery beat process; \n*     `flower` running [Flower](https://github.com/mher/flower) (for more info, check out [CeleryFlower](https://cookiecutter-django.readthedocs.io/en/latest/developing-locally-docker.html#celeryflower) instructions for local environment). \n\nCheck the original `cookiecutter-django`[deployment documentation](https://cookiecu
