isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:annotate_file_data": {"title": "Customize file-level metadata annotation method", "summary": "Hook method intended to be overridden to add or modify file-level annotations during import. Implementations can inject sample metadata such as PL (platform), LB (library), or other custom tags into file_data entries.", "tags": ["annotation", "file-metadata", "customization", "import"], "content": "# annotate_file_data\n\n```python\ndef annotate_file_data(self, experiment, file_data, file_type, src, dst)\n```\n\nOverwrite this method to provide custom file_data annotations.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:check_ownership": {"title": "Ensure matched files are owned by current user", "summary": "Validation helper that verifies the matched files are owned by the current user. It is used to prevent administrators from importing files they do not own unless ownership checks are explicitly ignored.", "tags": ["ownership", "permissions", "validation"], "content": "# check_ownership\n\n```python\ndef check_ownership(cache)\n```\n\nMake sure files matched are owned by current user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:check_are_readable": {"title": "Verify matched files are readable and accessible", "summary": "Validation function that ensures all matched files can be accessed and read by the process. It helps catch permission or path issues early in the import workflow to avoid partial imports or runtime failures.", "tags": ["readability", "access", "validation", "permissions"], "content": "# check_are_readable\n\n```python\ndef check_are_readable(cache)\n```\n\nMake sure files matched can be accessed and read.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:match_path": {"title": "Match path to detect FASTQ and BAM files", "summary": "Matches a filesystem path against a pattern and updates an internal cache when a FASTQ or BAM file is detected. This function performs pattern matching and classification used by the importer to assign files to experiments and determine read pairs.", "tags": ["path-matching", "file-detection", "fastq", "bam"], "content": "# match_path\n\n```python\ndef match_path(self, path, pattern)\n```\n\nMatch `path` with `pattern` and update cache if fastq or bam.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_files": {"title": "Import and register files into instance storage", "summary": "Moves or symlinks files into an experiment instance's storage_url and updates the database to register them. Supports copying instead of moving and accepts per-file metadata (files_data) such as platform or library identifiers. Raises an error if multiple conflicting data formats are detected and returns the patched experiment instance dictionary.", "tags": ["data-import", "file-management", "storage", "metadata"], "content": "# import_files\n\n```python\ndef import_files(self, instance, files, files_data, symlink, copy)\n```\n\nMove/link files into instance's `storage_url` and update database.\n\nArguments:\n    instance (dict): experiment instance.\n    files (dict): list of files to be imported.\n    copy (bool): if True files are copied intead of moved.\n    symlink (dict): whether to symlink or move the data.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other.\n\nRaises:\n    click.UsageError: if multiple data formats are found.\n\nReturns:\n    dict: patched experiment instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_regex_pattern": {"title": "Create regex pattern for flexible identifier matching", "summary": "Builds a named regex pattern that matches a given identifier while treating dashes, underscores, and dots equivalently. Offers an optional case-insensitive (iexact) mode. Returns the regex string suitable for use in named capture groups.", "tags": ["regex", "identifier-parsing", "string-matching"], "content": "# get_regex_pattern\n\n```python\ndef get_regex_pattern(group_name, identifier, iexact=False)\n```\n\nGet regex pattern for `identifier` group as `group_name`.\n\nThis pattern treats dashes, underscores and dots equally.\n\nArguments:\n    group_name (str): regex pattern group name.\n    identifier (str): identifier to be matched by regex.\n    iexact (bool): use case insensitive match.\n\nReturns:\n    str: a regex pattern.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_summary": {"title": "Generate import operation summary and outcomes", "summary": "Produces a summary of an import operation given the file list, target experiment, commit decision, and matched items. Aggregates the actions that would be or were performed and helps communicate the import result to users. Useful for pre-commit review and post-commit reporting.", "tags": ["import-summary", "reporting", "operations"], "content": "# get_summary\n\n```python\ndef get_summary(files, experiment, commit, matched)\n```\n\nReturn summary of the import operation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_data_from_yaml": {"title": "Import data into Isabl from a YAML file", "summary": "Imports data definitions from a local YAML file into Isabl, offering options to symlink or copy files, and to commit changes to the database. Accepts per-file metadata (files_data), ownership override, and filtering parameters to narrow which entries are processed. Designed to streamline bulk imports described in YAML manifests.", "tags": ["yaml", "bulk-import", "data-ingest", "file-management"], "content": "# import_data_from_yaml\n\n```python\ndef import_data_from_yaml(self, symlink=False, copy=False, commit=False, files_data=None, ignore_ownership=False, **filters)\n```\n\nImport data from local YAML file.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:cmd": {"title": "Register BED targets and baits for a technique", "summary": "Registers targets and baits BED files for a given technique and assembly, compressing and tabix-indexing incoming BEDs. Both gzipped and uncompressed versions are preserved, and instance fields such as storage_url, storage_usage, and reference_data are updated accordingly. This automates preparing capture kit resources for downstream analyses.", "tags": ["bed", "targets-baits", "tabix", "reference-data"], "content": "# cmd\n\n```python\ndef cmd(technique, assembly, targets_path, baits_path, description, species)\n```\n\nRegister targets and baits BED files in a technique's data directory.\n\nIncoming BED files will be compressed and tabixed. Both gzipped and\nuncompressed versions are kept. Instance's storage_url, storage_usage,\nand reference_data fields are updated.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/exceptions.py:PackageBaseException": {"title": "Base exception class for isabl_cli package", "summary": "Defines the foundational exception type for the isabl_cli package. Other custom exceptions in isabl_cli inherit from this class to provide a consistent error hierarchy and catch-all handling when needed.", "tags": ["exceptions", "error-handling", "isabl_cli"], "content": "# class PackageBaseException\n\nA base exception for isabl_cli.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ValidationError": {"title": "Validation error for input and config checks", "summary": "Represents errors raised when validation of inputs, parameters, or configuration fails. Use this exception to indicate user-supplied data or settings did not meet required constraints.", "tags": ["validation", "exceptions", "input-checks"], "content": "# class ValidationError\n\nA class to raise when a validation error occurs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingRequirementError": {"title": "Error for missing external or internal requirement", "summary": "Signals that a required component, dependency, or resource is not available. This exception should be raised when prerequisites for an operation are absent, such as missing binaries, libraries, or configuration entries.", "tags": ["requirements", "exceptions", "dependencies"], "content": "# class MissingRequirementError\n\nA class to raise when a requirement is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingOutputError": {"title": "Missing output file or artifact error class", "summary": "Raised when a file or artifact that should have been produced by a process is not found. This exception highlights failures in pipeline steps or post-processing where expected outputs are absent.", "tags": ["outputs", "exceptions", "pipelines"], "content": "# class MissingOutputError\n\nA class to raise when a file that should exist is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ConfigurationError": {"title": "Configuration error indicating improper setup", "summary": "Indicates that the application or environment is not properly configured. Use this exception to signal missing or invalid configuration entries that prevent normal operation.", "tags": ["configuration", "exceptions", "setup"], "content": "# class ConfigurationError\n\nA class to raise when is not properly configured.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ImplementationError": {"title": "Error for incomplete or incorrect implementation", "summary": "Used to indicate that a feature or function is not correctly implemented or contains a programming error. This exception is appropriate for signaling missing implementation details or internal inconsistencies.", "tags": ["implementation", "exceptions", "developer-errors"], "content": "# class ImplementationError\n\nA class to raise when is not properly implemented.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:CantBeRunError": {"title": "Exception for applications that cannot be executed", "summary": "Signals that an application or command cannot be run under current conditions. Use this to indicate fatal precondition failures that prevent execution even before runtime steps begin.", "tags": ["runtime", "exceptions", "preconditions"], "content": "# class CantBeRunError\n\nA class to raise when a application just cannot be run.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingDataError": {"title": "Error indicating missing required data resources", "summary": "Raised when required data for processing or analysis is missing. This exception helps identify situations where input datasets, sample records, or other essential data are unavailable.", "tags": ["data-validation", "exceptions", "missing-data"], "content": "# class MissingDataError\n\nA class to raise when data is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:AutomationError": {"title": "AutomationError exception class for automation failures", "summary": "Defines an AutomationError exception used to signal failures in automation processes. This class is intended to be raised when automated tasks or workflows fail, allowing callers to catch and handle automation-specific errors.", "tags": ["exceptions", "automation", "error-handling"], "content": "# class AutomationError\n\nA class to raise when automations fail.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/factories.py:projects": {"title": "Lazy projects factory method returning project list", "summary": "A lazy accessor method named projects that returns a list of project objects. The method delays evaluation until called, providing on-demand retrieval of project lists from the factory context.", "tags": ["factories", "projects", "lazy-loading"], "content": "# projects\n\n```python\ndef projects(self)\n```\n\nLazy method to return list of projects.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/factories.py"}, "isabl_cli/isabl_cli/options.py:get_analyses_filters_option": {"title": "Configure analyses filter option with defaults", "summary": "Function to construct analysis filter options for the CLI, accepting optional application class filters and default parameters. It centralizes how analysis filters are produced so CLI commands can apply consistent default filters and override them via inputs.", "tags": ["CLI options", "analyses", "filters", "configuration"], "content": "# get_analyses_filters_option\n\n```python\ndef get_analyses_filters_option(application_classes=None, **defaults)\n```\n\nGet analyses filters with `defaults`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/options.py"}, "isabl_cli/isabl_cli/options.py:get_dependency_analyses_option": {"title": "Resolve dependency analyses option from results", "summary": "Builds a CLI option to resolve dependency analyses from provided dependency results, allowing specification by application primary key or app name with optional version. The function also accepts extra filters to further restrict which dependency analyses are returned.", "tags": ["dependencies", "analyses", "CLI options", "filtering"], "content": "# get_dependency_analyses_option\n\n```python\ndef get_dependency_analyses_option(dependencies_results, **extra_filters)\n```\n\nGet dependencies from specified app pk or name [with version].", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/options.py"}, "isabl_cli/isabl_cli/settings.py:import_valid_applications": {"title": "Import valid application strings from client settings", "summary": "Parses and imports all valid application identifiers declared in client settings, ensuring configured application strings resolve to actual importable objects. It validates the configured application entries and imports them for use by the system.", "tags": ["settings", "imports", "applications", "validation"], "content": "# import_valid_applications\n\n```python\ndef import_valid_applications(val, setting_name)\n```\n\nImport all valid applications strings specified on the client settings.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:perform_import": {"title": "Perform module/class imports for configured values", "summary": "Performs one or multiple dynamic imports for values specified in settings, handling strings or iterables that represent import paths. This helper centralizes the import logic used across settings parsing to convert string references into live Python objects.", "tags": ["imports", "dynamic-loading", "settings", "utilities"], "content": "# perform_import\n\n```python\ndef perform_import(val, setting_name)\n```\n\nPerform the necessary import or imports.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:import_from_string": {"title": "Import a class or module from string path", "summary": "Attempts to import a class, function, or module given its string representation (dot-separated path), optionally providing the originating setting name for clearer error messages. It is a utility to dynamically resolve references in configuration to actual Python objects.", "tags": ["dynamic import", "settings", "reflection", "error-reporting"], "content": "# import_from_string\n\n```python\ndef import_from_string(val, setting_name=None)\n```\n\nAttempt to import a class from a string representation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:UserSettings": {"title": "UserSettings class managing per-user JSON configurations", "summary": "A class that manages user-specific configuration persisted to a JSON file at settings_path. It provides attribute-style access and mutation (__getattr__, __setattr__), a readable representation, and internal methods to read and write the settings.json file.", "tags": ["user settings", "persistence", "JSON", "configuration API"], "content": "# class UserSettings\n\nA class used to manage user specific configurations.\n\n## Methods\n\n### __repr__\n\n```python\ndef __repr__(self)\n```\n\nShow all configurations in `settings_path`.\n\n### __setattr__\n\n```python\ndef __setattr__(self, name, value)\n```\n\nWrite attribute to `settings_path`.\n\n### __getattr__\n\n```python\ndef __getattr__(self, name)\n```\n\nGet attribute from `settings_path`.\n\n### _read\n\n```python\ndef _read(self)\n```\n\nRead settings.json.\n\n### _write\n\n```python\ndef _write(self, name, value)\n```\n\nWrite key, value to settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:BaseSettings": {"title": "BaseSettings wrapper with defaults and imports handling", "summary": "A settings wrapper adapted from drf-yasg/rest_framework that merges defaults with user-supplied values, and supports importable strings and path-based settings. It exposes methods to initialize with defaults, produce a combined settings dictionary, and resolve attributes by checking user settings before falling back to defaults.", "tags": ["settings abstraction", "defaults", "import_strings", "drf-yasg"], "content": "# class BaseSettings\n\nObtained from drf-yasg/rest_framework.\n\n## Methods\n\n### __init__\n\n```python\ndef __init__(self, defaults, import_strings=None, path_strings=None)\n```\n\nSee: https://github.com/axnsan12/drf-yasg/.\n\n### _settings\n\n```python\ndef _settings(self)\n```\n\nReturn dictionary system with settings.\n\n### __getattr__\n\n```python\ndef __getattr__(self, attr)\n```\n\nCheck if present in user settings or fall back to defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:get_application_settings": {"title": "Build application settings dictionary from defaults", "summary": "Constructs a nested settings dictionary for applications given defaults, the environment settings, reference data, and importable strings. This function centralizes the logic to expand application configuration into a structured settings object ready for consumption by the platform.", "tags": ["application settings", "configuration builder", "defaults", "import handling"], "content": "# get_application_settings\n\n```python\ndef get_application_settings(defaults, settings, reference_data, import_strings)\n```\n\nBuild settings dot dict given defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__repr__": {"title": "String representation of settings object", "summary": "Defines the __repr__ method to produce a human-readable representation of the settings object by showing all configurations stored under the settings_path. Useful for debugging and quickly inspecting current in-memory and persisted configuration values.", "tags": ["settings", "debugging", "representation"], "content": "# __repr__\n\n```python\ndef __repr__(self)\n```\n\nShow all configurations in `settings_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__setattr__": {"title": "Persist attribute assignments to settings file", "summary": "Implements __setattr__ so that assigning attributes on the settings object writes the change to the persistent settings_path (settings.json). This ensures runtime attribute updates are saved for subsequent runs or shared processes.", "tags": ["persistence", "settings", "configuration"], "content": "# __setattr__\n\n```python\ndef __setattr__(self, name, value)\n```\n\nWrite attribute to `settings_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__getattr__": {"title": "Attribute lookup with default fallback logic", "summary": "A __getattr__ variant that checks whether an attribute is present in user settings and falls back to default values if not. This enforces a consistent lookup order so callers always receive the most relevant configuration value.", "tags": ["fallback", "settings", "accessor"], "content": "# __getattr__\n\n```python\ndef __getattr__(self, attr)\n```\n\nCheck if present in user settings or fall back to defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_read": {"title": "Load settings.json into memory", "summary": "Defines a private _read method that opens and parses the settings.json file to obtain persisted configuration. It centralizes file reading and any associated error handling for missing or malformed JSON files.", "tags": ["I/O", "settings", "json"], "content": "# _read\n\n```python\ndef _read(self)\n```\n\nRead settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_write": {"title": "Write key-value pairs to settings.json", "summary": "Implements a private _write method to persist a key and value into the settings.json file. It encapsulates the write operation so higher-level code can update configuration atomically and consistently.", "tags": ["persistence", "settings", "json"], "content": "# _write\n\n```python\ndef _write(self, name, value)\n```\n\nWrite key, value to settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__init__": {"title": "Initialize settings with defaults and import rules", "summary": "Constructor for the settings object that accepts defaults and optional import_strings and path_strings parameters. It follows patterns used by other libraries (see drf-yasg reference) to support automatic import resolution and path handling when building the effective settings.", "tags": ["initialization", "defaults", "configuration"], "content": "# __init__\n\n```python\ndef __init__(self, defaults, import_strings=None, path_strings=None)\n```\n\nSee: https://github.com/axnsan12/drf-yasg/.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_settings": {"title": "Return dictionary of system-wide settings", "summary": "This helper returns a dictionary containing system settings used by the Isabl CLI. It centralizes configuration values so callers can read settings consistently across the application.", "tags": ["settings", "configuration", "system", "dictionary"], "content": "# _settings\n\n```python\ndef _settings(self)\n```\n\nReturn dictionary system with settings.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:is_admin_user": {"title": "Check whether current user is admin", "summary": "Provides an is_admin_user helper that returns True when the current runtime user matches the ADMIN_USER configured in settings. Useful for gating CLI or API operations that require administrative privileges.", "tags": ["authorization", "users", "settings"], "content": "# is_admin_user\n\n```python\ndef is_admin_user(self)\n```\n\nReturn True if current user is ADMIN_USER.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:api_username": {"title": "Fetch current API username from database", "summary": "Defines an api_username accessor that retrieves the current username from the database (the Isabl user record). This abstracts the underlying data lookup so various parts of the CLI can consistently determine the active user.", "tags": ["users", "database", "identity"], "content": "# api_username\n\n```python\ndef api_username(self)\n```\n\nGet current username from database.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:client": {"title": "Retrieve Isabl client configuration from database", "summary": "This function fetches the client configuration object from the Isabl database. It is used by the CLI to obtain runtime client settings (credentials, endpoints, etc.) needed to interact with the Isabl server.", "tags": ["settings", "client", "database", "configuration"], "content": "# client\n\n```python\ndef client(self)\n```\n\nGet client configuration from database.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/signals.py:resume_analysis_signal": {"title": "Signal to resume interrupted analysis executions", "summary": "This signal triggers resumption of a previously started analysis, instructing the system to continue execution from its current state. It is intended for use when analyses were paused, failed transiently, or need to be continued without wiping existing results.", "tags": ["signals", "analysis", "resume", "orchestration"], "content": "# resume_analysis_signal\n\n```python\ndef resume_analysis_signal(analysis)\n```\n\nSignal to resume analysis execution.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/signals.py:force_analysis_signal": {"title": "Force wipe and restart analysis execution", "summary": "This signal forces an analysis to be wiped and restarted from scratch, clearing prior results and re-queuing execution. It's used when a full rerun is required due to corruption, configuration changes, or to ensure reproducibility.", "tags": ["signals", "analysis", "force", "reset"], "content": "# force_analysis_signal\n\n```python\ndef force_analysis_signal(analysis)\n```\n\nSignal to wipe analysis and restart.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/signals.py:run_web_signals": {"title": "Trigger analysis execution signals via web", "summary": "This function emits web-facing signals to trigger analysis execution, with optional flags to restart or force a run. It provides a central entry point so web UI or API calls can request resume, restart, or forced re-execution for an analysis.", "tags": ["web", "signals", "execution", "orchestration"], "content": "# run_web_signals\n\n```python\ndef run_web_signals(analysis, restart=False, force=False)\n```\n\nSignal to trigger analyses executions.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/utils.py:makedirs": {"title": "Make directories ignoring process umask settings", "summary": "makedirs(path, exist_ok=True, mode=511) creates directories while explicitly handling permissions to ignore the process umask. It behaves similarly to os.makedirs but ensures the requested mode is applied regardless of the calling process's umask.", "tags": ["filesystem", "utils", "directories", "permissions"], "content": "# makedirs\n\n```python\ndef makedirs(path, exist_ok=True, mode=511)\n```\n\nMake dirs ignoring umask.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_results": {"title": "Find matching analysis results for an experiment", "summary": "get_results searches an experiment object for results that match multiple filter criteria: result key, application key/name/version/assembly, target/reference dependencies, analyses, and expected status. It returns a list of tuples (result_value, analysis_pk) and supports complex matching rules including matching by app pk, name, or name+version; pass result_key='storage_url' to get output directories.", "tags": ["results", "experiment", "analysis", "filtering", "storage"], "content": "# get_results\n\n```python\ndef get_results(experiment, result_key, application_key=None, application_name=None, application_version=None, application_assembly=None, targets=None, references=None, analyses=None, status='SUCCEEDED', raise_error=True)\n```\n\nMatch results from a experiment object.\n\nIf targets, references or analyses are provided the analysis result must\nmatch these list of samples and dependencies. Match can be done by app pk, by app\nname, or by app name and cversion.\n\nPass `result_key='storage_url'` to get the output directory.\n\nArguments:\n    experiment (dict): experiment object for which result will be retrieved.\n    result_key (dict): name of the result.\n    application_key (int): key of the application that generated the result.\n    application_name (str): name of the application that generated the result.\n    application_version (str): version of the application that generated the result.\n    application_assembly (str): assembly name of the app. i.e: GRCh37.\n    targets (list): target experiments dicts that must match.\n    references (dict): reference experiments dicts that must match.\n    analyses (dict): analyses dicts that must match.\n    status (str): expected analysis status. For multiple, string with `/`.\n\nReturns:\n    list: of tuples (result_value, analysis primary key).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_result": {"title": "Get single matching result with error handling", "summary": "get_result is a convenience wrapper around get_results that returns a single matching result (value and producing analysis PK) and raises a clearer error when no or ambiguous matches are found. It accepts the same filters as get_results and allows passing application_name and application_assembly to produce more informative error messages.", "tags": ["results", "helper", "error-handling", "wrapper"], "content": "# get_result\n\n```python\ndef get_result(*args, **kwargs)\n```\n\nSee get_results for full signature.\n\nArguments:\n    args (list): see get_results.\n    kwargs (dict): see get_results.\n    application_name (str): app name to display a more explicit error.\n    application_assembly (str): app assembly name to display better error.\n\nReturns:\n    tuple: result value, analysis pk that produced the result", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:traverse_dict": {"title": "Traverse nested dictionary using list of keys", "summary": "traverse_dict(dictionary, keys, serialize=False) walks a nested dictionary following an ordered list of keys to retrieve a nested value. If serialize is True, the function forces the result to a string and JSON-serializes any dict values; otherwise it returns the raw object.", "tags": ["dict-utils", "traversal", "serialization", "utilities"], "content": "# traverse_dict\n\n```python\ndef traverse_dict(dictionary, keys, serialize=False)\n```\n\nTraverse a `dictionary` using a list of `keys`.\n\nArguments:\n    dictionary (dict): dict to be traversed.\n    keys (list): keys to be explored.\n    serialize (bool): force to string, if value is dict use json.dumps.\n\nReturns:\n    str: if `serialize` is True.\n    object: if `serialize` is false.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:apply_decorators": {"title": "Apply multiple decorators to a callable", "summary": "apply_decorators(decorators) returns a utility that composes and applies a list of decorator callables to a target callable. It simplifies programmatic application of several decorators in a specified order; the implementation references a StackOverflow pattern for decorator composition.", "tags": ["decorators", "utils", "python", "wrappers"], "content": "# apply_decorators\n\n```python\ndef apply_decorators(decorators)\n```\n\nApply a list of decorators to callable.\n\nSee: http://stackoverflow.com/questions/4122815", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_rsync_command": {"title": "Build rsync command string for moving directories", "summary": "Defines a helper that constructs an rsync command string to copy/move a source directory to a destination path. It accepts a chmod option (default 'a-w') to set permissions on the destination after transfer. The function returns the assembled command string for execution by the CLI or subprocess wrapper.", "tags": ["cli", "rsync", "filesystem", "utils"], "content": "# get_rsync_command\n\n```python\ndef get_rsync_command(src, dst, chmod='a-w')\n```\n\nGet str for commant to move `src` directory to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:check_rsync_version": {"title": "Detect outdated rsync lacking --append-verify support", "summary": "Parses rsync version stdout to determine whether the installed rsync supports the --append-verify option. The utility flags older rsync installations that do not include that feature so callers can adjust transfer strategies or warn the user. It is intended to be used before building rsync commands reliant on that flag.", "tags": ["cli", "rsync", "compatibility", "utils"], "content": "# check_rsync_version\n\n```python\ndef check_rsync_version(version_stdout)\n```\n\nCheck for outdated rsync lacking the --append-verify.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_tree_size": {"title": "Compute total directory size in bytes", "summary": "Returns the aggregate size in bytes for all files under a given path. The function supports an option to follow or ignore symbolic links (follow_symlinks=False by default) and recursively sums file sizes. It provides a simple way for CLI commands to report or validate storage usage.", "tags": ["filesystem", "io", "utils", "storage"], "content": "# get_tree_size\n\n```python\ndef get_tree_size(path, follow_symlinks=False)\n```\n\nReturn total size of directory in bytes.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:force_link": {"title": "Create or replace a hard link forcefully", "summary": "Creates a link from src to dst, ensuring the destination is created or replaced as needed. The helper enforces the link operation even if the destination already exists by removing or overwriting it. It is useful for atomic replacement or ensuring expected file layout in the CLI workflow.", "tags": ["filesystem", "links", "io", "utils"], "content": "# force_link\n\n```python\ndef force_link(src, dst)\n```\n\nForce a link between src and dst.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:force_symlink": {"title": "Create or replace a symbolic link safely", "summary": "Creates a symlink from src to dst, replacing any pre-existing destination to ensure the requested symlink is present. This utility manages removal of the old destination and creation of the new symlink in one step, simplifying CLI commands that update references. It handles common edge cases around existing files and permission constraints.", "tags": ["filesystem", "symlink", "io", "utils"], "content": "# force_symlink\n\n```python\ndef force_symlink(src, dst)\n```\n\nForce a symlink between src and dst.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:tar_dir": {"title": "Create a tar archive from a source directory", "summary": "Compresses or archives a source directory into the specified output path (tarball) for transport or storage. The helper packages a directory tree into a single file, preserving necessary metadata depending on implementation, and is intended for use in export/transfer CLI operations. Behavior for compression format and overwriting is driven by the function's implementation details.", "tags": ["tar", "archiving", "filesystem", "utils"], "content": "# tar_dir\n\n```python\ndef tar_dir(output_path, source_dir)\n```\n\nCompress a `source_dir` in `output_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:check_admin": {"title": "Verify current user is configured admin", "summary": "Checks whether the running user matches system_settings.ADMIN_USER and raises a PermissionError otherwise. An optional message parameter can customize the error text shown to the user. This safeguard is used by CLI commands that require administrative privileges within the Isabl environment.", "tags": ["permissions", "security", "cli", "utils"], "content": "# check_admin\n\n```python\ndef check_admin(msg=None)\n```\n\nRaise `PermissionError` if user is not `system_settings.ADMIN_USER`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:echo_add_commit_message": {"title": "Print guidance message for --commit flag usage", "summary": "Displays an informational message about the --commit flag to the user, typically when a CLI action can be performed in dry-run vs commit modes. This helper centralizes the wording so commands can consistently inform users about making destructive or permanent changes. It is a small UX utility for CLI interactions.", "tags": ["cli", "ux", "messages", "utils"], "content": "# echo_add_commit_message\n\n```python\ndef echo_add_commit_message()\n```\n\nEcho add `--commit` flag message.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:echo_title": {"title": "Print colored, optionally blinking CLI titles", "summary": "Prints a formatted title line to the console with configurable color and optional blink attribute for emphasis. It standardizes header output across CLI commands to improve readability and UX. Supported colors and behavior are provided by the implementation and intended for interactive terminal output.", "tags": ["cli", "ux", "formatting", "utils"], "content": "# echo_title\n\n```python\ndef echo_title(title, color='cyan', blink=False)\n```\n\nEcho a title.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:find_owner": {"title": "Identify the owner user of a file or directory", "summary": "Determines the owner (user) of a given filename or directory path, returning identification suitable for access checks or reporting. The helper is useful for validating ownership before operations like transfers, deletions, or permission changes in CLI workflows. It handles filesystem queries to map file metadata to a user identifier.", "tags": ["filesystem", "ownership", "permissions", "utils"], "content": "# find_owner\n\n```python\ndef find_owner(filename)\n```\n\nFind directory owner.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:assert_same_owner": {"title": "Validate filesystem path ownership by current user", "summary": "Describes a utility function assert_same_owner(path) that verifies a filesystem path is owned by the same user. It is intended to be used in CLI utilities or scripts to enforce ownership constraints before performing operations on files or directories.", "tags": ["cli", "filesystem", "permissions", "utils"], "content": "# assert_same_owner\n\n```python\ndef assert_same_owner(path)\n```\n\nValidate that a path is owned by the same user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:called_from": {"title": "Print caller location for debugging and tracing", "summary": "Documents called_from(depth=1, verbose=True), a helper that prints where the current function was called from. The function accepts a stack depth and verbosity flag to customize the amount of caller information printed for debugging or logging purposes.", "tags": ["debugging", "stack", "utils", "logging"], "content": "# called_from\n\n```python\ndef called_from(depth=1, verbose=True)\n```\n\nPrint where the current function was called from.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:send_analytics": {"title": "Send analytics for click commands or decorators", "summary": "Explains send_analytics(command), a utility that can be used either as a method or as a decorator for Click group commands to emit analytics events. It integrates telemetry into CLI commands so usage and execution can be tracked centrally.", "tags": ["analytics", "click", "telemetry", "utils"], "content": "# send_analytics\n\n```python\ndef send_analytics(command)\n```\n\nCan be used as method or decorator of click group commands to send analytics.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:first_matching_file": {"title": "Find first file matching pattern recursively", "summary": "Documents first_matching_file(directory, pattern, exclude=None, sort_by_newest=True, optional=False), which recursively searches a directory for the first file matching a glob pattern. It supports excluding files by substring, sorting results by creation time, and an optional mode that allows no-match to be acceptable, and raises errors when directory is invalid or no match is found (unless optional).", "tags": ["file-search", "filesystem", "globbing", "utilities"], "content": "# first_matching_file\n\n```python\ndef first_matching_file(directory, pattern, exclude=None, sort_by_newest=True, optional=False)\n```\n\nRecursively search within a directory for the first file that matches the pattern.\nArgs:\n    directory (str): the directory to search within.\n    pattern (str): a glob pattern (e.g., '*.txt') to match filenames.\n    exclude (str, optional): files containing this substring will be skipped.\n    sort_by_newest (bool, optional): sort by file's creation time, newer to older.\n    optional (bool): ok if none is found.\n\nReturns:\n    str: the path to the first matching file as a string.\n\nRaises:\n    NotADirectoryError: If `directory` is not a valid directory.\n    FileNotFoundError: If no matching file is found.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:wrapper": {"title": "Command wrapper that sends analytics after execution", "summary": "Describes wrapper(ctx, *args, **kwargs), a helper wrapper that sends a tracking event after a command has executed. It is intended to be used around Click command invocations so that telemetry is captured post-execution.", "tags": ["analytics", "click", "wrapper", "telemetry"], "content": "# wrapper\n\n```python\ndef wrapper(ctx, *args, **kwargs)\n```\n\nSend track event after the command is executed.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/validators.py:validate_patterns_are_files": {"title": "Validate that file patterns match existing non-empty files", "summary": "Covers validate_patterns_are_files(patterns, check_size=True), a validator that ensures each pattern in a list resolves to existing files. Optionally, it checks that matched files are non-zero size, and returns True when all patterns successfully match files.", "tags": ["validation", "files", "cli", "utils"], "content": "# validate_patterns_are_files\n\n```python\ndef validate_patterns_are_files(patterns, check_size=True)\n```\n\nCheck that a list of `patterns` are valid files.\n\nArguments:\n    patterns (list): a list of patterns to be check.\n    check_size (bool): check size is not zero for all files matched.\n\nReturns:\n    bool: True if all patterns match existing files.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_patterns_are_dirs": {"title": "Check that directory patterns resolve to directories", "summary": "Describes validate_patterns_are_dirs(patterns), which validates that each provided pattern corresponds to an existing directory. It accepts a list of directory patterns and returns True if all patterns resolve to directories, useful for validating CLI arguments or config inputs.", "tags": ["validation", "directories", "cli", "utils"], "content": "# validate_patterns_are_dirs\n\n```python\ndef validate_patterns_are_dirs(patterns)\n```\n\nCheck that a list of `patterns` are valid dirs.\n\nArguments:\n    patterns (list): a list of directory patterns.\n\nReturns:\n    bool: True if all patterns match existing directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_pairs": {"title": "Resolve and validate experimental sample pairs", "summary": "Briefly documents validate_pairs(pairs), a function intended to retrieve or validate experiment objects for provided sample pairs. It is used to ensure pair inputs map to valid experiments in downstream processing or CLI commands.", "tags": ["validation", "pairs", "experiments", "cli"], "content": "# validate_pairs\n\n```python\ndef validate_pairs(pairs)\n```\n\nGet experiments for pairs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_pairs_from_file": {"title": "Parse and validate sample pairs from TSV file", "summary": "Describes validate_pairs_from_file(ctx, _, path), a validator/Click callback that reads a TSV file and returns pairs parsed from it. It is intended for CLI commands that accept a file of sample pairs, performing parsing and validation before command execution.", "tags": ["pairs", "TSV", "validation", "cli"], "content": "# validate_pairs_from_file\n\n```python\ndef validate_pairs_from_file(ctx, _, path)\n```\n\nReturn pairs from tsv file.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "docs/index": {"title": "Isabl documentation homepage and platform overview", "summary": "The Isabl Docs home page provides an overview of the Isabl platform, its features, and links to core documentation sections such as Quick Start, Data Model, Importing and Retrieving Data, Applications, Deployment and Maintenance. It also includes links to community resources and a brief description of the platform's goals and origin.", "tags": ["documentation", "overview", "quick-start", "data-model", "resources"], "content": "# Home | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Home\n\nIsabl is a platform for the integration, management, and processing of individual-centric multimodal data. Welcome to the Isabl Documentation!\n\nIsabl is a plug-and-play data science framework designed to support the processing of multimodal patient-centric data. Have questions? Ask [here](https://gitter.im/isabl-io/community).\n\nIsabl has been developed by the [Elli Papaemmanuil's Lab](https://www.mskcc.org/research-areas/labs/elli-papaemmanuil).\n\n[Quick Start](https://docs.isabl.io/quick-start)\n## [](https://docs.isabl.io/#features)\n\nFeatures\n\n*     \n\n\ud83d\udc7e **Backend, Data Model and RESTful API**\n\n    *     Metadata version control \n    *     Fully featured and brisk RESTful API with extensive swagger documentation \n    *     Comprehensive permissions controls and user groups \n    *     \n\nPatient centric relational model with support for:\n\n        *     _Individuals_, _samples_, _experiments_ and _cohorts_ \n        *     _Assembly_ aware bioinformatics _applications_ and _analyses_ \n        *     Choice models such as _diseases_, _centers_ and more \n        *     **Custom fields** for all schemas! \n\n*     \n\n\ud83e\udd16 **Command Line Interface and Software Development Kit**\n\n    *     Digital Assets Management (Permissions, Storage, Tracking) \n    *     Automated execution and tracking of bioinformatics applications \n    *     Project and patient level results auto-merge \n    *     Operational automations on data import and analyses status change \n    *     Dynamic retrieval of data and results using versatile queries \n    *     Fully featured SDK for post-processing analyses \n\n*     \n\n\ud83d\ude80 **Web Application**\n\n    *     User Interface to browse and manage the operations metadata \n    *     Analyses tracking and results visualization \n    *     Flexibility to edit and customize models \n    *     Batch creation of metadata by excel file submission \n    *     Single Page Application that provides a crispy user experience \n    *     Possibility to integrate third-party services like JIRA \n\n*     \n\n\u2705 **Plug-n-play and reliable codebase**\n\n    *     Docker-compose is the only dependency for the web application and the backend \n    *     The Command Line Interface is a portable pip installable package \n    *     Continuously Integrated with +98 % coverage across all codebase \n    *     isabl is upgradable, no need to fork out from codebase \n\n## [](https://docs.isabl.io/#who-is-using-isabl)\n\nWho is using Isabl\n\n*     [Elli Papaemmanuil's lab](https://www.mskcc.org/research-areas/labs/elli-papaemmanuil). \n*     The [Department of Pediatrics](https://www.mskcc.org/blog/one-one-how-msk-using-precision-medicine-tailor-treatment-children-cancer) at Memorial Sloan Kettering. \n*     [Sohrab Shah's lab](https://www.mskcc.org/profile/sohrab-shah). \n*     The [Microbiome Program](https://www.mskcc.org/research-areas/labs/jonathan-peled) at Memorial Sloan Kettering. \n*     The [Single-Cell Analytics Service (SAIL)](https://www.mskcc.org/research/ski/innovation-labs/single-cell-analytics-innovation-lab-sail) at Memorial Sloan Kettering. \n*     [Cristina Curtis' Lab](https://med.stanford.edu/curtislab.html) at Stanford Medicine. \n\n... And many other groups at Weill Cornell, California State University, University of Oviedo (Spain), are currently testing it as a potential fit!\n\n## [](https://docs.isabl.io/#infrastructure)\n\nInfrastructure\n\nIsabl is a modular infrastructure with four main components: (1) an individual-centric and extensible relational database (Isabl-db); (2) a comprehensive RESTful API (Isabl-api) used to support integration with data processing environments and enterprise systems (e.g. clinical databases, visualization platforms); (3) a Command Line Client (CLI; Isabl-cli) used to manage digital assets and deploy bioinformatics applications; (4) a front end single page web application (Isabl-web) with system wide queries enabled.\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vQnO2UBtPAGuUqobgfAH2GFbvuE5aCAzrYpxa_nBb8tigeT-GdfAkurTnOpzrpa_QDxBH-nrQ-lnxEk%2Fpub%3Fw%3D998%26h%3D712&width=768&dpr=3&quality=100&sign=abc1a911&sv=2)\n\nIsabl is composed of a patient centric relational model, a web-based metadata architecture, and a command line client.\n\nRESTful API capabilities are documented with Swagger ([https://swagger.io](https://swagger.io/)) and Redoc ([https://github.com/Rebilly/ReDoc](https://github.com/Rebilly/ReDoc)) following OpenAPI specifications ([https://www.openapis.org](https://www.openapis.org/)). Importantly, Isabl's metadata infrastructure is decoupled and agnostic of compute and data storage environments (e.g. local, cluster, cloud). This functionality separates dependencies and fosters interoperability across compute environments.\n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vTLYVgPubPSlSgyUahpZ3fOT-p9lmrMet5qCl1klS2VzEnFIE4zLW0WK3cDZaCgAmwcsa3Ta-J9ujdG%2Fpub%3Fw%3D889%26h%3D667&width=768&dpr=3&quality=100&sign=9f4223fe&sv=2)\n\n## [](https://docs.isabl.io/#data-model)\n\nData Model\n\n**I**sabl's relational model maps workflows for data provenance, processing, and governance. Metadata is captured across the following thematic categories: (1) project, individual and sample level attributes; (2) raw data properties including experimental technique, technology, and related parameters (e.g. read length); (3) analytical workflows to include a complete audit trail of versioned algorithms, related execution parameters, reference files, analyses status tracking, and results deposition; (4) data governance information for management of system and data access across stakeholders.\n\n![Image 7](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vTG3QBMOtwM5DhpFG07iQFj0SA0J7CE4e8Xd3ZJcpJy24EiDu9HbGomqslNFgqV3rauJ-z_VU-SY-ja%2Fpub%3Fw%3D1305%26h%3D791&width=768&dpr=3&quality=100&sign=5dd8f90&sv=2)\n\n## [](https://docs.isabl.io/#why-isabl)\n\nWhy Isabl\n\nIsabl ensures that all bioinformatics operations follow the DATA reproducibility checklist (Documentation, Automation, Traceability, and Autonomy), whilst guarantees that assets are managed according to the FAIR principles (Findable, Interoperable, Accessible, Reusable).\n\n![Image 8](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vRCagXfy-ubxEHKL3GOSTTEGE1g9hWk1Ic0yTx3tWsBJHWSIfO5Y2Hcu0wTeBtb3mA1DeEXKw4c1fBd%2Fpub%3Fw%3D1216%26h%3D810&width=768&dpr=3&quality=100&sign=736da4f1&sv=2)\n\nHere are some reasons why you may want to use Isabl:\n\n*     You don't have a +10 engineers group but do have hundreds of samples \n*     You'll rather not have your data managed by postdocs, PhD students \n*     Crosslink samples from different cohorts \n*     Answer new questions using existing data \n*     Full log and audit trail of your informatics operations \n*     Automatically merge results as new samples are added to big cohorts \n*     You want to have programmatic access to the entire data capital \n*     Seamlessly run reproducible pipelines across your projects \n\n## [](https://docs.isabl.io/#similar-projects)\n\nSimilar projects\n\n*     [The Genome Modeling System](https://github.com/genome/gms)_Genome Institute at Washington University platform._ \n*     [SeqWare](https://seqware.github.io/)_analyze massive genomics datasets._ \n*     [QuickNGS](http://bifacility.uni-koeln.de/quickngs/web/)_efficient high-throughput data analysis of Next-Generation Sequencing data._ \n*     [HTS-flow](https://github.com/arnaudceol/htsflow)_a framework for the management and analysis of NGS data._ \n\n## [](https://docs.isabl.io/#what-isabl-is-not)\n\nWhat Isabl is not\n\n*     Isabl is not a _Workflow Management System_ such as [toil](https://github.com/DataBiosphere/toil), [bpipe](https://github.com/ssadedin/bpipe), instead Isabl facilitates automated deployment and databasing of data processing pipelines. \n*     Isabl is not a _Platform as a Service (PAAS)_ provider such as [DNA nexus](https://www.dnanexus.com/), [Seven Bridges](https://www.sevenbridges.com/) or [Fire Cloud](https://software.broadinstitute.org/firecloud/), instead an information system that could potentially feed in metadata and data to these services. \n*     Isabl differs from _Server Workbenches_ such as [Galaxy](https://usegalaxy.org/) or Pegasus, instead of being configuration friendly, Isabl is designed to conduct systematic analyses automatically and in a standardized way with as little human input as possible. \n*     Isabl is not a _Workflow Language_, instead the Bioinformatics Applications in `isabl` only define meta-data driven validation and logic to build commands to trigger pipelines written in any language. \n\n[Next Quick Start](https://docs.isabl.io/quick-start)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Features](https://docs.isabl.io/#features)\n*   [Who is using Isabl](https://docs.isabl.io/#who-is-using-isabl)\n*   [Infrastructure](https://docs.isabl.io/#infrastructure)\n*   [Data Model](https://docs.isabl.io/#data-model)\n*   [Why Isabl](https://docs.isabl.io/#why-isabl)\n*   [Similar projects](https://docs.isabl.io/#similar-projects)\n*   [What Isabl is not](https://docs.isabl.io/#what-isabl-is-not)\n\nWas this helpful?", "source_url": "https://docs.isabl.io/"}, "docs/batch-systems": {"title": "Supported Batch Systems for Job Submission", "summary": "Describes the batch systems Isabl supports out-of-the-box and how the CLI submits jobs to them. Lists supported systems (LSF, Slurm, SGE) and gives the import strings to reference the submission functions used by isabl_cli.", "tags": ["batch-systems", "job-scheduling", "Slurm", "LSF", "SGE"], "content": "# Batch Systems | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Batch Systems\n\n\ud83e\udeb5 How to use different known batch systems for scalable job execution.\n\nCurrently Isabl supports out-of-the-box the following **Batch Systems**to submit jobs with `isabl_cli`:\n\nBatch System\n\nImport string\n\nResources\n\n**LSF**\n\n`isabl_cli.batch_systems.submit_lsf`\n\nSee more [IBM Spectrum LSF Reference](https://www.ibm.com/docs/en/spectrum-lsf/10.1.0?topic=started-quick-start-guide)\n\n**Slurm**\n\n`isabl_cli.batch_systems.submit_slurm`\n\nSee more [Slurm - Worload Manager](https://slurm.schedmd.com/documentation.html)\n\n**SGE**\n\n`isabl_cli.batch_systems.submit_sge`\n\nSee more [Sun Grid Engine - queueing system](http://star.mit.edu/cluster/docs/0.93.3/guides/sge.html)\n\nBy default, all submissions are run **locally** using `isabl_cli.batch_systems.submit_local`\n\n**What about other systems?**\n\nTo support other systems or to customize your own submission steps, you may need just to create your own method and define it on your `isabl_cli`'s `SUBMIT_ANALYSES` setting.\n\n**Example:**\n\nCopy\n```\n# my_isabl_extension/batch_systems.py\ndef submit_aws_batch(app, command_tuples):\n    ...\n```\n\nCopy\n```\n// Isabl CLI settings:\n{..., \"SUBMIT_ANALYSES\": \"my_isabl_extension.batch_systems.submit_aws_batch\"}\n```\n\nFor help, creating your custom submit method, follow direction from the [existing ones](https://github.com/papaemmelab/isabl_cli/tree/master/isabl_cli/batch_systems).\n\nPlease consider contributing any new one to the **Isabl Project!**\ud83d\udc8c\n\n### [](https://docs.isabl.io/batch-systems#submit-configuration)\n\n**Submit Configuration**\n\n`isabl_cli`'s settings have a `SUBMIT_CONFIGURATION` dictionary to provide extra arguments to the submission methods. Current parameters used are:\n\nAttribute\n\nType\n\nDescription\n\nExample value\n\n`extra_args`\n\n_String_\n\nAny additional extra arguments passed to the batch submission command.\n\n`\" --time=48:00:00 \"`. Add a maximum job array time.\n\n`get_requirements`\n\n_Import String_\n\nTo define custom resources needs for different applications or methods.\n\nSee the example above.\n\n`throttle_by`\n\n_Integer_\n\nTo control the maximum number of jobs running simultaneously in a job array submission.\n\n`50`\n\n`unbuffer`\n\n_Boolean_\n\nredirect stdout and stderr to same file with ascii characters that allow colored logs.\n\n`True`. If not defined, it is `False` by default. See [Colored Logs](https://docs.isabl.io/batch-systems#colored-logs-with-batch-systems).\n\n#### [](https://docs.isabl.io/batch-systems#example-settings)\n\nExample Settings:\n\n[Previous Maintenance](https://docs.isabl.io/maintenance)[Next Contributing Guide](https://docs.isabl.io/contributing-guide)\n\nLast updated 1 year ago\n\nWas this helpful?\n\nWas this helpful?\n\nCopy\n```\n// isabl cli's settings\n{\n    ...\n    \"SUBMIT_ANALYSES\": \"isabl_cli.batch_systems.submit_slurm\",\n    \"SUBMIT_CONFIGURATION\": {\n        \"extra_args\": \" -p GPU_PARTITION \",\n        \"get_requirements\": \"my_isabl_extension.batch_systems.get_slurm_requirements\",\n        \"throttle_by\": 50,\n        \"unbuffer\": True,\n    },\n    \"SUBMIT_MERGE_ANALYSIS\": \"my_isabl_extension.batch_systems.submit_merge_analysis_to_slurm\",\n    ...\n}\n```\n\nCopy\n```\n# my_isabl_extension/batch_systems.py\n\nfrom my_isabl_extension import apps\n\ndef get_slurm_requirements(app, targets_methods):\n    \"\"\"Get custom requirements for any app or method.\"\"\"\n    \n    # Defaults\n    runtime = 240 # 6 hours\n    cores = 1\n    memory = 6\n    \n    # Technique.method-specific    \n    method = targets_methods[0]\n    if method == \"WG\":\n        runtime = 10080 # 7 days\n\n    # Application-specific\n    if isinstance(app, apps.BwaMemGRCh37):\n        cores = 32\n        runtime = 1440 # 24 hours\n        memory = 8\n\n    return (\n        f\"--ntasks=1 \"\n        f\"--cpus-per-task={cores} \"\n        f\"--time={runtime} \"\n        f\"--mem-per-cpu={memory}G \"\n    )\n\ndef submit_merge_analysis_to_slurm(instance, application, command):\n    \"\"\"Submit command to run merge in slurm.\"\"\"\n\n    command = f\"sbatch --ntasks=1 --cpus-per-task=1 --mem=32G {command}\"\n    subprocess.check_call(command.split())\n    click.secho(f\"Submitted project level merge with: {command}\", fg=\"yellow\")\n```", "source_url": "https://docs.isabl.io/batch-systems"}, "docs/bonus-tips": {"title": "Tips and Tricks for Isabl CLI", "summary": "Collects helpful extra features and UX tips to improve the Isabl experience, including enhancements like colored logs when using batch systems. The page highlights small customizations and practical tips that make using Isabl-CLI and job submission more efficient and readable.", "tags": ["tips", "cli", "logging", "usability"], "content": "# Bonus tips | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Bonus tips\n\n\ud83c\udfb1 Some extra features to maximize your isabl journey!\"\n\n### [](https://docs.isabl.io/bonus-tips#colored-logs-with-batch-systems)\n\n\ud83c\udf08 Colored Logs with Batch Systems\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FEpBHmQrxRb8NXgcR5MgQ%252FScreenshot%25202024-10-21%2520at%25202.18.41%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3D55eabe53-38ec-423d-8169-f4e0340060f3&width=768&dpr=3&quality=100&sign=72812ac0&sv=2)\n\nDefault: No colored logs \n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252F6Go4EZdtHmFNX0RhnaVC%252FScreenshot%25202024-10-21%2520at%25202.17.20%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3D1da4626f-af75-409d-ba65-cf7ccddc8ea1&width=768&dpr=3&quality=100&sign=9c7de1ef&sv=2)\n\nColored unbuffered logs\n\nWhen running jobs using batch systems like LSF or Slurm, many programs detect whether their output is being sent to a terminal (`TTY`) or a file and may disable features like color formatting or progress bars if they detect non-interactive output.\n\nOne workaround, using it carefully, is to use the [`unbuffer`](https://manpages.debian.org/stretch/expect/unbuffer.1.en.html) utility from the `expect` package. `unbuffer` simulates a terminal by running the program in a pseudo-terminal (PTY), tricking the program into thinking it is running interactively in a terminal, so it continues to produce colored output.\n\n**Requirements:**\n\n*     Have `unbuffer` available. See tips on [how to install on an HPC](https://docs.isabl.io/bonus-tips#bonus-tip-install-unbuffer-in-an-hpc-with-miniconda). \n*     `unbuffer: True`**,**in your `isabl_cli`s `SUBMIT_CONFIGURATION`. \n*     `>=0.3.28` version of `@papaemmelab/isabl_web` \n*     [8c8ad75](https://github.com/papaemmelab/isabl_cli/commit/8c8ad75c85b6c86f291787fcfbf4a51532930154) commit of `isabl_cli` \n\nUnbuffered output will redirect both stdout/stderr to the same`head_job.log`file, causing the file `head_job.err` output to be empty from errors of the running application.\n\nBy simulating a pseudo-PTY, you can gain desired colored outputs, but some outputs like progress bars print undesired characters that can clutter your logs. Be aware to disable those if possible (i.e. `toil ... --disableProgress),`or for specific applications add a dummy env`TERM=dumb` to tell the program there's no effective terminal attached.\n\n#### [](https://docs.isabl.io/bonus-tips#bonus-tip-install-unbuffer-in-an-hpc-with-miniconda)\n\n**\u2795 Bonus tip**: **Install**`unbuffer`**in an HPC with miniconda.**\n\nHaving `$OPT_DIR` where you install your packages and `$BIN_DIR` where you add your executable binaries, create a runnable script called `unbuffer`, where you add your miniconda env's `unbuffer` executable and add its shared libraries:\n\nTest it works:\n\n### [](https://docs.isabl.io/bonus-tips#use-igv-links-to-be-1-click-away-to-visualize-your-mutation-calls)\n\n\ud83e\uddec Use IGV links to be 1-click away to visualize your mutation calls\n\nThe frontend allows the user to visualize alignment files (`bam`/ `cram`) through IGV, by using the API's `igv` endpoints in 2 cases:\n\n*     `/api/v1/experiments/igv/{system_id}?assembly={assembly}&locus={locus}`: To visualize an aligned file stored in the`Experiment.bam_files` \n*     `/api/v1/analyses/igv/{pk}?result={result}&result_index={result_index}&locus={locus}`: to visualize an analysis result whose `frontend_type` is `igv_<result><result-index>. See`[`Frontend Result Types`](https://docs.isabl.io/writing-applications#frontend-result-types) \n\nBut you can also use these endpoints widely to dynamically create your own **igv links**, when doing data analyses or creating reports!\n\n#### [](https://docs.isabl.io/bonus-tips#demo-time)\n\nDemo time\n\nThis is a cool example where you can generate clickable links in jupyter to visualize fusions events. The idea is to be 1-click away to visualize the reads of a specific sample in the locus of interest to see if a mutation is a real event or not. Taking into account that the param variable `locus` supports multiple locus for example to visualize the 2 breakpoints of the fusion. Each locus, creates a new igv view in a tab. The locus can be defined by adding multiple ones separated by a space.\n\n![Image 7](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FuizTEuYEgsB1jzoZDLsf%252FScreenshot%25202025-02-26%2520at%25201.38.40%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3Dbf0f031d-639f-4116-9959-eadbc9cfdc6d&width=768&dpr=3&quality=100&sign=4b157fb1&sv=2)\n\nCreate IGV links in a Jupyter Notebook\n\nHere you have an **IGV link** for each event. For example, clicking in the `GTF2I::GTF2IRD1`fusion link, will open an IGV where you can visualize the 2 breakpoints: `https://{my-instance}/api/v1/experiments/igv/{system_id}?assembly={assembly}&locus={locus1}%20{locus2}`\n\n`%20` is the safe url encoding for a `space` character, needed to append multiple locus.\n\n![Image 8](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FW4ibAmLKUX9Mjuh6woqj%252FScreenshot%25202025-02-26%2520at%25201.39.20%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3Ddedaf527-d79f-4d2b-a1f2-d347a14896aa&width=768&dpr=3&quality=100&sign=f2046ac2&sv=2)\n\nVisualize events pointing to the desired locus. Example showing a`GTF2I::GTF2IRD1`fusion in 2 locus at `7:74125440`and`7:74015371`\n\nThis feature is extremely powerful and useful, especially for generating reports with tens or thousands of variants. You can click on any variant to visualize it in IGV!\n\n[Previous Other CLI commands](https://docs.isabl.io/other-cli-commands)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [\ud83c\udf08 Colored Logs with Batch Systems](https://docs.isabl.io/bonus-tips#colored-logs-with-batch-systems)\n*   [\ud83e\uddec Use IGV links to be 1-click away to visualize your mutation calls](https://docs.isabl.io/bonus-tips#use-igv-links-to-be-1-click-away-to-visualize-your-mutation-calls)\n\nWas this helpful?\n\nCopy\n```\nconda create -n myenv\nconda activate myenv\nconda install -c conda-forge expect\n```\n\n${BIN_DIR}/unbuffer\n\nCopy\n```\n#!/bin/bash\n\nOPT_DIR=<your-installation-dir>\nexport LD_LIBRARY_PATH=\"${OPT_DIR}/miniconda3/envs/myenv/lib:$LD_LIBRARY_PATH\"\n${OPT_DIR}/miniconda3/envs/myenv/bin/unbuffer \"$@\"\n```\n\nCopy\n```\n$ unbuffer echo \"Hello World!\" \nHello World\n```", "source_url": "https://docs.isabl.io/bonus-tips"}, "docs/contributing-guide": {"title": "Contributing Guide: Development Environment Setup", "summary": "Provides a step-by-step tutorial to set up a full development environment for Isabl components and explains how to contribute. It covers cloning the repositories, local development practices, and encourages community contributions to code, documentation, and tests.", "tags": ["contributing", "development", "setup", "isabl-api"], "content": "# Contributing Guide | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Contributing Guide\n\n\u23f1 tutorial time: 20 minutes\n\nThis tutorial will help you set up a **full Development environment** with all components of the `isabl` infrastructure.\n\n\ud83d\udcd8 Contributions are welcome, and they are greatly appreciated! Every little bit helps, and credit will always be given. `isabl` could always use more documentation, whether as part of the **README**, in doc-strings, or even on the web in blog posts articles, and such. Also, bet you've read the [Zen Of Python](https://www.python.org/dev/peps/pep-0020/#the-zen-of-python).\n\n## [](https://docs.isabl.io/contributing-guide#isabl-api)\n\nIsabl API\n\n1.     Clone locally:\n\n Copy\n```\ngit clone [email\u00a0protected]:papaemmelab/isabl_api.git\n cd api\n```  \n2.     Build containers:\n\n Copy`docker-compose build`  \n3.     Run tests using [tox](http://tox.readthedocs.io/):\n\n Copy`docker-compose run --rm django tox` \nO
